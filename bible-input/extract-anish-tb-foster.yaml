uncertainty_or_questions:
  - "Air Bud and Leprosy window defaults (airBudWindow/leprosyWindow) are both 1 bar by default, making them very tight reversals. This may be intentional for catching intrabar reversals, but could be a design choice to tighten or loosen via input."
  - "RVOL thresholds (i_rv_b_th, i_rv_r_th) use rv_p (price velocity ratio) >= threshold, not > threshold. Confirm if equality (==) is intentional for edge cases."
  - "B2B signals (b2bPUP, b2bPPD) are tier-2 composites but only depend on a single root each (2-bar same signal). Could be classified as roots if definition is 'two consecutive X bars', but listed as composites per schema guidance."
  - "First Pass logic resets neutralPhaseComplete only on specific conditions (bearPass entered for pupArmed, bullPass entered for ppdArmed, or firstPUPPass/firstPPDPass fired). Confirm this persistent-until-reset behavior is intended."
  - "TB and Foster state machines now fire on three different root/composite signals (PPD/PBJ/PB for TB; PUP/PBJ/PB for Foster). These are extracted as three separate composites (TB, TBPBJSignal, TBPBSignal) rather than one variant composite. Confirm this is the preferred schema structure."
