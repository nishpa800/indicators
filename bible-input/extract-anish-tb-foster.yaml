    - "AnishBear (bearPass): identical definition, but not plotted as standalone in this variant"

  shared_composites:
    - "SuperPup: identical definition (sPPBull AND bullPass)"
    - "SuperPPD: identical definition (sPPBear AND bearPass)"
    - "TB (Topping Break): expanded to accept three triggers (PPBear, BearPBJ, BearPB) instead of one; state machine simplified"
    - "Foster (Foster Rescue): expanded to accept three triggers (PPBull, BullPBJ, BullPB) instead of one; state machine simplified"

  new_roots:
    - "RVOLBull: relative volume indicator combining range and volume velocity"
    - "RVOLBear: relative volume indicator combining range and volume velocity"
    - "BullPB: PB&J engine primitive — price cross above MA with level approach"
    - "BullPBJ: PB&J engine primitive — price cross above MA with PBJ condition (jelly touch)"
    - "BearPB: PB&J engine primitive — price cross below MA with level approach"
    - "BearPBJ: PB&J engine primitive — price cross below MA with PBJ condition (jelly touch)"

  new_composites:
    - "TBPBJSignal: TB variant firing on sBearPBJ trigger within window"
    - "TBPBSignal: TB variant firing on sBearPB trigger within window"
    - "FosterPBJSignal: Foster variant firing on sBullPBJ trigger within window"
    - "FosterPBSignal: Foster variant firing on sBullPB trigger within window"
    - "B2BPUP: back-to-back PUP (consecutive bars)"
    - "B2BPPD: back-to-back PPD (consecutive bars)"
    - "AirBud: bullish reversal catch (PPD/RVOL Bear armed, then PUP/RVOL Bull fires)"
    - "Leprosy: bearish reversal catch (PUP/RVOL Bull armed, then PPD/RVOL Bear fires)"
    - "FirstPUPPass: PUP in neutral, then Anish Bull entry"
    - "FirstPPDPass: PPD in neutral, then Anish Bear entry"

