indicator:
  id: disp-4x
  file: disp-4x/versions/DISP_4X_v1.pine
  branch: claude/organize-indicators-hierarchy-8JDw1
  pine_version: 5
  line_count: 121
  overlay: true
  one_line_purpose: "Four independent displacement engines (D1/D2/D3/D4) in one indicator; default σ-multipliers 6.5/6.0/5.5/5.0; stack 4 instances on a chart for 16 simultaneous displacement-strength views"
  is_canonical_for: ["D1_BULL", "D1_BEAR", "D2_BULL", "D2_BEAR", "D3_BULL", "D3_BEAR", "D4_BULL", "D4_BEAR"]
  notes: |
    All 8 plots use offset=-1 because FVG confirmation occurs on bar[0] but
    the displaced candle is bar[1]; plotting on bar[1] aligns the marker
    with the actual displacement bar. Each engine has its own boolean
    namespace (d1_*, d2_*, d3_*, d4_*) — they share NO state. The only
    differences across the 4 engines are the IPSF defaults (multiplier,
    plot shape, plot location, plot color).
    Future: may expand to 15-20 engines per `docs/glossary.md` σ-multiplier
    notes; same D<n>_BULL/D<n>_BEAR naming pattern.

internal_helpers:
  - name: d_rng / d_std / d_thresh / d_prevDisp / d_bullFVG / d_bearFVG
    purpose: Per-engine displacement-detection scaffolding (range vs σ-stdev gate; FVG geometry on bar[0])
    notes: "Internal — not roots. Same pattern repeated 4 times under the d1_/d2_/d3_/d4_ prefix."

roots:
  - id: disp-4x::D1_BULL
    family: displacement
    plain_english: "Displacement 1 Bull — bar[1] range exceeds σ-multiplier (default 6.5) × stdev(range, 100), AND bar[0] confirms a bullish 3-bar FVG (low > high[2] AND close[1] > open[1])"
    boolean_summary: "barstate.isconfirmed AND d1_rng[1] > d1_thresh[1] AND low > high[2] AND close[1] > open[1]"
    parameters:
      - { name: d1_type, default: "Open to Close", units: enum, ipsf: true }
      - { name: d1_len, default: 100, units: bars, ipsf: true }
      - { name: d1_mult, default: 6.5, units: σ-multiplier, ipsf: true }
    offset: -1
    plot_offset: -1
    plot_call: 'plotshape(d1_show_b and d1_bull, "D1 Bull", shape.square, location.top, color.new(#00FF00, 0), text="D1", textcolor=color.white, size=size.small, offset=-1)'
    alertcondition_id: "D1 Bull"
    pine_source_line_range: "L41"
    lifecycle_stage: 2
    notes: "Strictest of the four bull engines (highest default multiplier). offset=-1 aligns plot with bar[1] (the actual displaced candle)."

  - id: disp-4x::D1_BEAR
    family: displacement
    plain_english: "Displacement 1 Bear — bar[1] range exceeds σ-multiplier (default 6.5) × stdev(range, 100), AND bar[0] confirms a bearish 3-bar FVG (high < low[2] AND close[1] < open[1])"
    boolean_summary: "barstate.isconfirmed AND d1_rng[1] > d1_thresh[1] AND high < low[2] AND close[1] < open[1]"
    parameters:
