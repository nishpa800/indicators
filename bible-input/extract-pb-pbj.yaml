  - "If byte-identical, designate pb-pbj::* as canonical (per its filename 'PB & PBJ — 4 Signals PB PBJ ONLY THIS') and mark hvd-pbj-ppd::PBJ_BULL/BEAR/PB_BULL/PB_BEAR as variants."
