    plot_call: 'plotshape(show_BearPB and sigBearPB, title="Sig#3 Bear PB", style=shape.labeldown, location=location.top, color=color.new(color.orange, 75), size=size.small, text="PB", textcolor=color.white, offset=0)'
    alertcondition_id: "Sig#3 Bear PB"
    pine_source_line_range: "L265"
    lifecycle_stage: 2
    notes: "Mirror of PB_BULL for short setups. Mutual exclusion with PBJ_BEAR. All settings IPSF."

  - id: pb-pbj::PBJ_BEAR
    family: candle
    plain_english: "Bearish PBJ — Supertrend sell_cross occurs while the PB&J wick filter has been triggered (high pierced pbj_ma * (1 + thresh), at the highest of HH/LL lookback, with volume above floor)"
    boolean_summary: "barstate.isconfirmed AND sell_cross AND wait_pbj_sell"
    parameters:
      - { name: zoo_ma_type, default: VWMA, units: enum, ipsf: true }
      - { name: zoo_ma_len, default: 5, units: bars, ipsf: true }
      - { name: zoo_pbj_ma_period, default: 20, units: bars, ipsf: true }
      - { name: zoo_pbj_atr_period, default: 14, units: bars, ipsf: true }
      - { name: zoo_pbj_hh_ll, default: 25, units: bars, ipsf: true }
      - { name: zoo_pbj_atr_mult, default: 3.0, units: multiplier, ipsf: true }
