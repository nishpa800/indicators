indicator:
  id: pb-pbj
  file: pb-pbj/versions/PB_PBJ_v1.pine
  branch: claude/organize-indicators-hierarchy-8JDw1
  pine_version: 5
  line_count: 290
  overlay: true
  one_line_purpose: "Canonical isolated PB/PBJ engine — 4 dedicated detection roots with OKEH Zoo + PB&J Filter + Supertrend pipeline; all defaults preserved from YY+D+PBJ source"
  is_canonical_for: ["PB_BULL", "PB_BEAR", "PBJ_BULL", "PBJ_BEAR"]
  extracted_from: "Yin Yang + Displacement + PBJ (YY+D+PBJ)"
  notes: |
    Each PB/PBJ pair is mutually exclusive on the same direction:
    sigBullPB requires NOT sig_pbj_buy; sigBearPB requires NOT sig_pbj_sell.
    A bar that satisfies both filters is classified as PBJ.
    All 4 signals gated by barstate.isconfirmed; alerts use
    alert.freq_once_per_bar_close for non-repainting 1:1 parity.

internal_helpers:
  - name: f_ma()
    purpose: Switch-based MA selector (VWMA/EMA/SMA/WMA/HMA); default VWMA(close, 5)
    pine_source_line_range: "L91-L100"
    notes: "Internal — not a root."
  - name: Supertrend
    purpose: ATR(10)*2.0 trailing-stop direction classifier (st_dir)
    pine_source_line_range: "L106-L127"
    notes: "Internal — not a root. Applied when zoo_use_st=true (default ON)."
  - name: PB&J Filter (pbj_buy / pbj_sell)
    purpose: ATR-banded EMA wick test — low/high outside pbj_ma ± thresh, with HH/LL lookback gate and volume floor
    pine_source_line_range: "L143-L150"
    notes: "Produces the buy/sell pre-confirmation flags consumed by the level manager. Internal."
  - name: Level management (bull_lvls, bear_lvls)
    purpose: Per-direction landing-box arrays tracking approach state via f_check_approach()
    pine_source_line_range: "L153-L213"
    notes: "Stateful arrays of `lvl` UDT records. Internal."
  - name: wait_buy / wait_sell / wait_pbj_buy / wait_pbj_sell
    purpose: Var-state machines tracking whether a buy/sell setup is ready to fire
    pine_source_line_range: "L221-L240"
    notes: "Reset by their corresponding sig_pb_*/sig_pbj_* fire. Internal state."

roots:
  - id: pb-pbj::PB_BULL
    family: candle
    plain_english: "Bullish PB landing — Supertrend buy_cross AND a tracked bull-zone landing-box was approached AND PBJ filter did NOT fire (mutual exclusion with PBJ_BULL)"
    boolean_summary: "barstate.isconfirmed AND buy_cross AND wait_buy AND NOT (buy_cross AND wait_pbj_buy)"
    parameters:
      - { name: zoo_ma_type, default: VWMA, units: enum, ipsf: true }
      - { name: zoo_ma_len, default: 5, units: bars, ipsf: true }
      - { name: zoo_pbj_ma_period, default: 20, units: bars, ipsf: true }
      - { name: zoo_pbj_atr_period, default: 14, units: bars, ipsf: true }
      - { name: zoo_pbj_hh_ll, default: 25, units: bars, ipsf: true }
      - { name: zoo_pbj_atr_mult, default: 3.0, units: multiplier, ipsf: true }
      - { name: zoo_pbj_vol_period, default: 20, units: bars, ipsf: true }
      - { name: zoo_pbj_vol_mult, default: 0.1, units: multiplier, ipsf: true }
      - { name: zoo_use_st, default: true, units: bool, ipsf: true }
      - { name: zoo_st_period, default: 10, units: bars, ipsf: true }
      - { name: zoo_st_mult, default: 2.0, units: multiplier, ipsf: true }
    offset: 0
    plot_offset: 0
    plot_call: 'plotshape(show_BullPB and sigBullPB, title="Sig#1 Bull PB", style=shape.labelup, location=location.bottom, color=color.new(color.aqua, 75), size=size.small, text="PB", textcolor=color.white, offset=0)'
    alertcondition_id: "Sig#1 Bull PB"
    pine_source_line_range: "L259"
    lifecycle_stage: 2
    notes: "Mutual exclusion with PBJ_BULL — bar that satisfies both is classified as PBJ. All settings IPSF (input.*)."

  - id: pb-pbj::PBJ_BULL
    family: candle
    plain_english: "Bullish PBJ — Supertrend buy_cross occurs while the PB&J wick filter has been triggered (low pierced pbj_ma * (1 - thresh), at the lowest of HH/LL lookback, with volume above floor)"
    boolean_summary: "barstate.isconfirmed AND buy_cross AND wait_pbj_buy"
    parameters:
      - { name: zoo_ma_type, default: VWMA, units: enum, ipsf: true }
      - { name: zoo_ma_len, default: 5, units: bars, ipsf: true }
      - { name: zoo_pbj_ma_period, default: 20, units: bars, ipsf: true }
      - { name: zoo_pbj_atr_period, default: 14, units: bars, ipsf: true }
      - { name: zoo_pbj_hh_ll, default: 25, units: bars, ipsf: true }
      - { name: zoo_pbj_atr_mult, default: 3.0, units: multiplier, ipsf: true }
      - { name: zoo_pbj_vol_period, default: 20, units: bars, ipsf: true }
      - { name: zoo_pbj_vol_mult, default: 0.1, units: multiplier, ipsf: true }
      - { name: zoo_use_st, default: true, units: bool, ipsf: true }
      - { name: zoo_st_period, default: 10, units: bars, ipsf: true }
      - { name: zoo_st_mult, default: 2.0, units: multiplier, ipsf: true }
    offset: 0
    plot_offset: 0
    plot_call: 'plotshape(show_BullPBJ and sigBullPBJ, title="Sig#2 Bull PBJ", style=shape.diamond, location=location.bottom, color=color.new(color.yellow, 25), size=size.normal, text="PBJ", textcolor=color.white, offset=0)'
    alertcondition_id: "Sig#2 Bull PBJ"
    pine_source_line_range: "L262"
    lifecycle_stage: 2
    notes: "Stronger filter than PB_BULL. Internal: PB&J filter (pbj_buy) requires low pierce + HH/LL lowest + volume gate. All settings IPSF."

  - id: pb-pbj::PB_BEAR
    family: candle
    plain_english: "Bearish PB landing — Supertrend sell_cross AND a tracked bear-zone landing-box was approached AND PBJ filter did NOT fire (mutual exclusion with PBJ_BEAR)"
    boolean_summary: "barstate.isconfirmed AND sell_cross AND wait_sell AND NOT (sell_cross AND wait_pbj_sell)"
    parameters:
      - { name: zoo_ma_type, default: VWMA, units: enum, ipsf: true }
      - { name: zoo_ma_len, default: 5, units: bars, ipsf: true }
      - { name: zoo_pbj_ma_period, default: 20, units: bars, ipsf: true }
      - { name: zoo_pbj_atr_period, default: 14, units: bars, ipsf: true }
      - { name: zoo_pbj_hh_ll, default: 25, units: bars, ipsf: true }
      - { name: zoo_pbj_atr_mult, default: 3.0, units: multiplier, ipsf: true }
      - { name: zoo_pbj_vol_period, default: 20, units: bars, ipsf: true }
      - { name: zoo_pbj_vol_mult, default: 0.1, units: multiplier, ipsf: true }
      - { name: zoo_use_st, default: true, units: bool, ipsf: true }
      - { name: zoo_st_period, default: 10, units: bars, ipsf: true }
      - { name: zoo_st_mult, default: 2.0, units: multiplier, ipsf: true }
    offset: 0
