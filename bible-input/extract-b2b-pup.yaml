    composition:
      type: OR
      operands:
        - type: AND
          label: "DISP path"
          operands: ["b2b-pup::PUP[-1]", "b2b-pup::PUP[-2]", "b2b-pup::DISPBull", "b2b-pup::DISPBull[-1]"]
        - type: AND
          label: "HVD path"
          operands: ["b2b-pup::PUP[-1]", "b2b-pup::PUP[-2]", "b2b-pup::HVDBull", "b2b-pup::HVDBull[-1]"]
    offset: -1
