composites:
  - id: b2b-pup::B2B_PUP
    tier: 1
    plain_english: "Back-to-back PUP: PUP fires on bar[0] AND PUP fired on bar[1]."
    composition:
      type: AND_LAGGED
      operands: ["b2b-pup::PUP", "b2b-pup::PUP[-1]"]
    offset: 0
    plot_call: "(intermediate det_b2bPUP — also fires as S1 plot via fire_S1_bull)"
    pine_source_line_range: "L978"
  - id: b2b-pup::B2B_PPD
    tier: 1
    plain_english: "Back-to-back PPD."
    composition:
      type: AND_LAGGED
      operands: ["b2b-pup::PPD", "b2b-pup::PPD[-1]"]
    offset: 0
    plot_call: "(intermediate det_b2bPPD — also S1 bear)"
    pine_source_line_range: "L978"
  - id: b2b-pup::B2B_HVD_BULL
    tier: 2
