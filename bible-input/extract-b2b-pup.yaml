indicator:
  id: b2b-pup
  file: b2b-pup/versions/B2B_PUP_Combined_v4.32_2026-05-04.pine
  branch: both
  pine_version: 5
  line_count: 1259
  overlay: true
  one_line_purpose: "Aggregator: 20 numbered S-plots fusing back-to-back PUP/PPD with FAUNA, displacement, HV+D, PBJ, RVOL ladder, TNT/Napalm/Charge/CONT engines, and FVG/Matrix/Unified combos"
  is_canonical_for: ["PUP (likely)", "PPD (likely)"]
  sibling_byte_diff: "B2B_PUP_v4.32.pine differs only in line endings (Combined file uses CRLF; sibling uses LF). Both 1259 lines, identical content."
  reference_indicator: "TNT OD (../tnt-od/) is the canonical reference for Napalm/TNT/CONT engine logic; Engine G must mirror it."

internal_helpers:
  - name: f_touches2
    pine_source_line_range: "L52"
    notes: "Returns true if either of two bar indices equals the session-first bar index. Used by first-bar gating for plotshape offset alignment."
  - name: f_add
    pine_source_line_range: "L53"
    notes: "String concat helper for Bloomberg-format alert aggregator (joins parts with '+')."
  - name: masterGate
    pine_source_line_range: "L66-L68"
    notes: "First-bar-only gate: when en_firstBarOnly is ON, requires session.isfirstbar AND any HV-50/100/200/500/1000 hit on bar[0]. Otherwise true."
  - name: f_ma
    pine_source_line_range: "L146-L153"
    notes: "Switch over MA type strings (EMA/SMA/WMA/HMA/VWMA) returning the matching ta.* call."
  - name: pp_redVol / pp_greenVol / pp_hiRedVol / pp_hiGreenVol
    pine_source_line_range: "L76-L77"
    notes: "Red/green volume series and rolling-highest opposite-color volume over pp_lookback bars (excludes current bar via [1]). Used by det_PUP and det_PPD."
  - name: "FAUNA family booleans (f_MB_b/r, f_RE_b/r, f_GG_b/r, f_TA_b/r) and exclusion booleans (f_TR_b/r, f_ES_b/r, f_GDR_b/r, f_excluded_bull, f_excluded_bear)"
    pine_source_line_range: "L85-L114"
    notes: "Per the v4.30 README all 7 family checkboxes are hardcoded ON. det_FAUNABull/Bear are computed from MB OR RE OR TA, with GG only via the score>=2 + bodyRat>=0.80 path; TR/ES/GDR exclude."
  - name: "PBJ engine helpers (f_add_lvl, f_add_lander, f_add_reaccel, f_check_approach)"
    pine_source_line_range: "L185-L235"
    notes: "Builds and maintains bull_lvls/bear_lvls arrays of `lvl` (Pine type at L177-181) for level-approach detection used by det_PBBull/Bear and det_PBJBull/Bear."
  - name: "RVOL threshold table functions (f_th_1x, f_th_gs, f_th_saab, f_th_wtc, f_th_hiro)"
    pine_source_line_range: "L277-L282"
    notes: "Pre-Mythos timeframe-keyed σ-multiplier ladders for the SAAB / 1x / GS / WTC / Hiroshima tiers."
  - name: "TNT zone+event types (TntZone, ChargeLvl, BBEvent, tnt_SP)"
    pine_source_line_range: "L383-L386, L497-L505, L588-L593, L627-L631"
    notes: "Pine type definitions backing the multi-zone TNT tracker, charge ladder, event log (for TNT 2.0), and swing-pivot tracker."
  - name: "TNT helpers (f_tnt_tok, f_tnt_zov, f_tnt_sb, f_tnt_ss)"
    pine_source_line_range: "L480-L484"
    notes: "Confluence helpers for TNT raw detection (window-overlap, zone-overlap, side-of-RSI/EMA-slope checks)."
  - name: "GZ1 / HV-FVG helpers (gz_isHV, gz_thr, gz_bFVG, gz_sFVG, gz_fvgs array)"
    pine_source_line_range: "L705-L753"
    notes: "Bull/Bear FVG detection plus interlock with prior FVG entries; produces gz_bullHV/Bear and gz_bullGZI/bearGZI consumed by CS1."
  - name: "UU pathway scanners (f_uu_bull_scan, f_uu_bear_scan)"
    pine_source_line_range: "L863-L918"
    notes: "Squareify A-F evaluation loops returning [hp,hpb,hh,hd,hf,ad,asd,dnp,pnd] flags consumed by det_UUBull/Bear, det_UUUBull/Bear, det_UUUUBull/Bear."
  - name: "Bloomberg alert aggregators (f_agg_bull_b2b, f_agg_bear_b2b)"
    pine_source_line_range: "L1092-L1173"
    notes: "Concatenate +-joined alert strings from all 20 S-plot fire booleans."

roots:
  - id: b2b-pup::PUP
    family: push
    plain_english: "Bullish push: bar closes ≥3% above its open AND its volume exceeds the highest red-bar volume in the prior 10 bars (red volume of the current bar excluded)."
    boolean_summary: "conf AND (close-open)/open*100 > pp_barSize AND volume > ta.highest(pp_redVol[1], pp_lookback)"
    parameters:
      - { name: pp_barSize,    default: 3.0, units: "%" }
      - { name: pp_lookback,   default: 10,  units: bars }
    offset: 0
    plot_call: "(no direct plot — det_PUP feeds det_b2bPUP and S-plots; bar[0] anchor)"
    pine_source_line_range: "L73-L78"
    notes: "Definition is local. PUP is named here as a primitive (Anish identifies PUP as a root). Likely overlaps with hvd-pbj-ppd's PUP — bible may need to designate one canonical."
  - id: b2b-pup::PPD
    family: push
    plain_english: "Bearish pocket-pivot day: bar closes ≥3% below its open AND its volume exceeds the highest green-bar volume in the prior 10 bars (green volume of the current bar excluded)."
    boolean_summary: "conf AND (open-close)/open*100 > pp_barSize AND volume > ta.highest(pp_greenVol[1], pp_lookback)"
    parameters:
      - { name: pp_barSize,    default: 3.0, units: "%" }
      - { name: pp_lookback,   default: 10,  units: bars }
    offset: 0
    plot_call: "(no direct plot — det_PPD feeds det_b2bPPD and S-plots; bar[0] anchor)"
    pine_source_line_range: "L73-L79"
    notes: "Mirror of PUP for the down direction. Same parameter inputs."
  - id: b2b-pup::FAUNA_BULL
    family: bar-strength-composite
    plain_english: "FAUNA bull bar: an up-bar that satisfies at least one of MB (Momentum Bar: body ≥1.6×ATR14, body/range ≥0.70, vol ≥1.8×AvgVol), RE (Range Expansion: range ≥2.2×ATR14, close near high, vol ≥1.8×AvgVol), or TA (Trend Acceleration: rising 50-SMA, Δclose ≥1.6×AvgΔ, vol ≥1.8×AvgVol); the GG (Gap-and-Go) family is only allowed when 2+ core-FAUNA hit AND body/range ≥0.80; excluded by TR/ES/GDR (post-weak/strong/gap-down-reversal pre-bar context)."
    boolean_summary: "conf AND (f_MB_b OR f_RE_b OR f_TA_b) AND NOT (f_TR_b OR f_ES_b OR f_GDR_b OR (f_GG_b AND NOT (core>=2 AND bodyRat>=0.80)))"
    parameters:
      - { name: ATR_len,            default: 14,  units: bars }
      - { name: AvgVol_sma_len,     default: 20,  units: bars }
      - { name: AvgBody_sma_len,    default: 20,  units: bars }
      - { name: AvgDelta_sma_len,   default: 10,  units: bars }
      - { name: TrendMA_len,        default: 50,  units: bars }
    offset: 0
    plot_call: "(no direct plot — det_FAUNABull is consumed by S2/S4/Matrix paths; bar[0] anchor)"
    pine_source_line_range: "L85-L113"
    notes: "Per v4.30 changelog the 7 family checkboxes were removed and all are hardcoded ON. Whether FAUNA is a 'root' or composite-of-named-primitives depends on the bible's stance on MB/RE/GG/TA being individually-named family primitives."
  - id: b2b-pup::FAUNA_BEAR
    family: bar-strength-composite
    plain_english: "FAUNA bear bar: mirror of FAUNA_BULL — down-bar satisfying at least one of MB/RE/TA bear families, with GG-bear only allowed via the 2-core + bodyRat≥0.80 path; excluded by mirror TR/ES/GDR."
    boolean_summary: "conf AND (f_MB_r OR f_RE_r OR f_TA_r) AND NOT (f_TR_r OR f_ES_r OR f_GDR_r OR (f_GG_r AND NOT (core>=2 AND bodyRat>=0.80)))"
    parameters:
      - { name: ATR_len,            default: 14,  units: bars }
      - { name: AvgVol_sma_len,     default: 20,  units: bars }
      - { name: AvgBody_sma_len,    default: 20,  units: bars }
      - { name: AvgDelta_sma_len,   default: 10,  units: bars }
      - { name: TrendMA_len,        default: 50,  units: bars }
    offset: 0
    plot_call: "(no direct plot — det_FAUNABear is consumed by S2/S4/Matrix paths; bar[0] anchor)"
    pine_source_line_range: "L85-L114"
    notes: "Same as FAUNA_BULL questions about root vs composite status."
  - id: b2b-pup::DISPBull
    family: displacement
    plain_english: "Bullish 3-bar FVG: prior bar's body (or range) exceeds disp_mult × stdev (default 5×) AND a bullish FVG forms (low > high[2] AND close[1] > open[1])."
    boolean_summary: "conf AND disp_rng[1] > disp_thresh[1] AND low > high[2] AND close[1] > open[1]"
    parameters:
      - { name: disp_type, default: "Open to Close", units: "enum {Open to Close, High to Low}" }
      - { name: disp_len,  default: 100,             units: bars }
      - { name: disp_mult, default: 5.0,             units: σ }
    offset: -1
    plot_call: "(no direct plot — det_DISPBull feeds S3/S4/S6/UU paths; bar[1] anchor)"
    pine_source_line_range: "L119-L127"
    notes: "Anchored to the FVG-creation bar via offset=-1 in plotshapes that consume it."
  - id: b2b-pup::DISPBear
    family: displacement
    plain_english: "Bearish 3-bar FVG: prior bar's body (or range) exceeds disp_mult × stdev AND a bearish FVG forms (high < low[2] AND close[1] < open[1])."
    boolean_summary: "conf AND disp_rng[1] > disp_thresh[1] AND high < low[2] AND close[1] < open[1]"
    parameters:
      - { name: disp_type, default: "Open to Close", units: "enum" }
      - { name: disp_len,  default: 100,             units: bars }
      - { name: disp_mult, default: 5.0,             units: σ }
    offset: -1
    plot_call: "(no direct plot — det_DISPBear consumed by S3/S4/S6/UU; bar[1] anchor)"
    pine_source_line_range: "L119-L128"
    notes: "Mirror of DISPBull."
  - id: b2b-pup::PBJBull
    family: pbj
    plain_english: "PBJ bull cross-firing: a Supertrend (over VWMA/EMA/SMA/WMA/HMA base) bullish crossover that lands at a previously-armed PBJ buy level (low < pbj_ma*(1-zoo_thresh), low = lowest of zoo_pbj_hh_ll, vol > avg_vol*zoo_pbj_vol_mult)."
    boolean_summary: "conf AND ta.crossover(close, sig_line) AND wait_pbj_buy"
    parameters:
      - { name: zoo_ma_type,        default: "VWMA", units: "enum" }
      - { name: zoo_ma_len,         default: 5,      units: bars }
      - { name: zoo_use_st,         default: true,   units: bool }
      - { name: zoo_st_period,      default: 10,     units: bars }
      - { name: zoo_st_mult,        default: 2.0,    units: × }
      - { name: zoo_pbj_ma_period,  default: 20,     units: bars }
      - { name: zoo_pbj_atr_period, default: 14,     units: bars }
      - { name: zoo_pbj_hh_ll,      default: 25,     units: bars }
      - { name: zoo_pbj_atr_mult,   default: 3.0,    units: × }
      - { name: zoo_pbj_vol_period, default: 20,     units: bars }
      - { name: zoo_pbj_vol_mult,   default: 0.1,    units: × }
    offset: 0
    plot_call: "(no direct plot — det_PBJBull feeds S6/UU and HVD-PBJ chains; bar[0] anchor)"
    pine_source_line_range: "L134-L260"
    notes: "PBJ is the entry-quality refinement of the PB level-approach engine. det_PBBull (line 262) is the lower-tier 'PB but NOT PBJ' classifier — also a named primitive in this file."
  - id: b2b-pup::PBJBear
    family: pbj
    plain_english: "Mirror PBJ bear: Supertrend bearish crossunder + previously-armed PBJ sell level (high > pbj_ma*(1+zoo_thresh), high = highest of zoo_pbj_hh_ll, vol > avg_vol*zoo_pbj_vol_mult)."
    boolean_summary: "conf AND ta.crossunder(close, sig_line) AND wait_pbj_sell"
    parameters: [{ name: "(see PBJBull)" }]
    offset: 0
    plot_call: "(no direct plot — det_PBJBear feeds S6/UU/HVD-PBJ; bar[0] anchor)"
    pine_source_line_range: "L134-L261"
    notes: "Mirror of PBJBull."
  - id: b2b-pup::PBBull
    family: pbj
    plain_english: "PB-only bull: Supertrend cross-up at an armed PB level approach but NOT a PBJ-quality level."
    boolean_summary: "conf AND sig_pb_buy AND NOT sig_pbj_buy"
    offset: 0
    plot_call: "(no direct plot — building block for UU pathways)"
    pine_source_line_range: "L262"
    notes: "Strict-disjoint partner to PBJBull. Whether this is a 'root' depends on whether PB is named separately in the bible."
  - id: b2b-pup::PBBear
    family: pbj
    plain_english: "PB-only bear: mirror of PBBull."
    boolean_summary: "conf AND sig_pb_sell AND NOT sig_pbj_sell"
    offset: 0
    plot_call: "(no direct plot — building block)"
    pine_source_line_range: "L263"
    notes: "Mirror of PBBull."
  - id: b2b-pup::SAAB
    family: rvol-tier
    plain_release: "RVOL band SAAB bull: rv_baseBull AND rv_normPrice in [0.56× threshold ladder, 1× threshold)."
    boolean_summary: "rv_baseBull AND rv_normPrice >= th_saab AND rv_normPrice < th_1x"
    offset: 0
    plot_call: "(no direct plot — feeds CS1, S5, UU)"
    pine_source_line_range: "L283"
    notes: "th_saab = th_1x * 0.56 from f_th_saab/f_th_1x ladders."
  - id: b2b-pup::Kratos
    family: rvol-tier
    plain_english: "RVOL band Kratos = SAAB-bear analogue: rv_baseBear AND rv_normPrice in [th_saab, th_1x)."
    offset: 0
    plot_call: "(no direct plot — feeds CS1-bear, S5-bear, UU-bear)"
    pine_source_line_range: "L284"
  - id: b2b-pup::RVOL1xBull
    family: rvol-tier
    plain_english: "RVOL 1× bull: rv_normPrice in [th_1x, th_gs)."
    offset: 0
    plot_call: "(no direct plot)"
    pine_source_line_range: "L285"
  - id: b2b-pup::RVOL1xBear
    family: rvol-tier
    plain_english: "RVOL 1× bear: mirror of RVOL1xBull on rv_baseBear."
    offset: 0
    plot_call: "(no direct plot)"
    pine_source_line_range: "L286"
  - id: b2b-pup::GrandSlam
    family: rvol-tier
    plain_english: "RVOL Grand Slam bull: rv_normPrice >= th_gs."
    offset: 0
    plot_call: "(no direct plot)"
    pine_source_line_range: "L287"
  - id: b2b-pup::MOAB
    family: rvol-tier
    plain_english: "RVOL MOAB = Grand Slam bear analogue: rv_baseBear AND rv_normPrice >= th_gs."
    offset: 0
    plot_call: "(no direct plot)"
    pine_source_line_range: "L288"
  - id: b2b-pup::Pentagon
    family: rvol-tier
    plain_english: "Pentagon: tv_ta.relativeVolume(30, '', cumulative=true, sameTime=true) ratio in [th_1x, th_wtc]."
    offset: 0
    plot_call: "(no direct plot — feeds CS1/CS2)"
    pine_source_line_range: "L289-L291"
  - id: b2b-pup::WTC
    family: rvol-tier
    plain_english: "WTC: relVol ratio in (th_wtc, th_hiro]. th_wtc = th_1x*2.0."
    offset: 0
    plot_call: "(no direct plot — feeds CS2-neutral path and S5 neutral)"
    pine_source_line_range: "L292"
  - id: b2b-pup::Hiroshima
    family: rvol-tier
    plain_english: "Hiroshima: relVol ratio > th_hiro."
    offset: 0
    plot_call: "(no direct plot — feeds CS2-neutral and S5)"
    pine_source_line_range: "L293"
  - id: b2b-pup::Nagasaki
    family: rvol-tier
    plain_english: "Nagasaki: bar volume sets a new running all-time max (rv_isNag)."
    offset: 0
    plot_call: "(no direct plot — feeds CS2)"
    pine_source_line_range: "L294-L301"
  - id: b2b-pup::HVDBull
    family: hv+disp
    plain_english: "Highest-volume + Displacement bull: bar[1] is HV (top of 50/100/200/500/1000 OR ever-HV) AND bullish displacement+FVG fires."
    boolean_summary: "(hv_isHEV OR hv_is1000 OR hv_is500 OR hv_is200 OR hv_is100 OR hv_is50) AND hvd_dispBull"
    parameters:
      - { name: hvd_type,  default: "Open to Close", units: "enum" }
      - { name: hvd_len,   default: 100,             units: bars }
      - { name: hvd_mult,  default: 5.0,             units: σ }
    offset: -1
    plot_call: "(no direct plot — feeds S3d/S4d/S6/S17/S18 and UU pathways)"
    pine_source_line_range: "L306-L324"
    notes: "Same disp engine pattern as Engine C, bound to HV-rank bar[1]."
  - id: b2b-pup::HVDBear
    family: hv+disp
    plain_english: "Mirror HVDBull on bear side."
    offset: -1
    plot_call: "(no direct plot)"
    pine_source_line_range: "L306-L325"
  - id: b2b-pup::HVDPBJBull
    family: hv+disp+pbj
    plain_english: "HVDBull AND PBJ bull on bar[1]."
    boolean_summary: "det_HVDBull AND nz(det_PBJBull[1])"
    offset: -1
    plot_call: "(no direct plot — feeds S6/S18 chains)"
    pine_source_line_range: "L326"
  - id: b2b-pup::HVDPBJBear
    family: hv+disp+pbj
    plain_english: "Mirror HVDPBJBull bear."
    offset: -1
    plot_call: "(no direct plot)"
    pine_source_line_range: "L327"
  - id: b2b-pup::TNT_RAW_BULL
    family: tnt
    plain_english: "Raw bull TNT: simultaneous (within tnt_CW=2*EMA_SLOW window) confluence of (a) volume-weighted EMA crossover zone, (b) Anish swing-pivot zone, (c) Flux/displacement zone, with strong-bull side test (median-vol gate, EMA slope > 0, RSI < 80, > 30% vertical zone overlap)."
    boolean_summary: "tnt_bConf AND f_tnt_sb(...) AND conf AND (bar_index - tnt_lBSB) > tnt_MIN_SIG_GAP"
    parameters:
      - { name: tnt_SENS,         default: 100,   units: bars }
      - { name: tnt_SWING_LEN,    default: 10,    units: bars }
      - { name: tnt_DISP_STD_X,   default: 5,     units: σ }
      - { name: tnt_SUDDEN_PROX,  default: 3,     units: bars }
      - { name: tnt_MAX_ZONES,    default: 30,    units: zones }
      - { name: tnt_RET_PCT,      default: 100.0, units: "%" }
    offset: 0
    plot_call: "(no direct plot — feeds det_bullTNT, charge ladder, event log, CONT, S15)"
    pine_source_line_range: "L356-L494"
    notes: "Must mirror TNT OD. Per CHANGELOG v4.30 the rewrite ported TNT OD's full architecture (3-clause CONT, Return-leg, super-TNT)."
  - id: b2b-pup::TNT_RAW_BEAR
    family: tnt
    plain_english: "Mirror TNT_RAW_BULL on the bear side."
    offset: 0
    plot_call: "(no direct plot)"
    pine_source_line_range: "L356-L494"
  - id: b2b-pup::RetBullTNT
    family: tnt-return
    plain_english: "Return-to-TNT bull: an active bull TNT zone is touched at retLvl = lower + (upper-lower)*(tnt_RET_PCT/100) by low and close > zone.lower; fires once per zone."
    offset: 0
    plot_call: "(no direct plot — feeds CONT path)"
    pine_source_line_range: "L540-L552"
  - id: b2b-pup::RetBearTNT
    family: tnt-return
    plain_english: "Mirror RetBullTNT on bear-zone side."
    offset: 0
    plot_call: "(no direct plot — feeds CONT)"
    pine_source_line_range: "L553-L562"
  - id: b2b-pup::Napalm_BULL
    family: napalm
    plain_english: "Bull Napalm: a bull TNT-internal-displacement bar where the prior bar's low > the level of any active opposing (bear) TNT zone (scans all active bear zones, breaks on first hit)."
    boolean_summary: "conf AND tnt_dBull AND any active bear zone z where low[1] > z.level"
    offset: 0
    plot_call: "(no direct plot — feeds S13/S16 and CONT/event-log)"
    pine_source_line_range: "L569-L578"
    notes: "v4.30: changed from single tnt_lastBearLvl scan to all-active-zones scan."
  - id: b2b-pup::Napalm_BEAR
    family: napalm
    plain_english: "Mirror Napalm_BULL on bear side."
    offset: 0
    plot_call: "(no direct plot)"
    pine_source_line_range: "L579-L585"
  - id: b2b-pup::Charge_BULL
    family: charge
    plain_english: "Bull Charge: bull TNT-internal-displacement bar that violates an unviolated bear ChargeLvl (close[1] > level). On fire, pushes a NEW bull ChargeLvl at low[1] to maintain the alternating-direction ladder (v4.32 fix)."
    offset: 0
    plot_call: "(no direct plot — feeds CONT, super-TNT, event-log)"
    pine_source_line_range: "L602-L612"
    notes: "v4.32 patched the ladder push (line 611). Anish notes Napalm and Charge are the same conceptual signal."
  - id: b2b-pup::Charge_BEAR
    family: charge
    plain_english: "Mirror Charge_BULL on bear side; pushes a new bear ChargeLvl at high[1] on fire."
    offset: 0
    plot_call: "(no direct plot)"
    pine_source_line_range: "L613-L621"
    notes: "v4.32 patched the ladder push (line 620)."
  - id: b2b-pup::TNT2_BULL
    family: tnt-super
    plain_english: "TNT 2.0 bull (super): the bull event-log has 2+ entries (TNT-raw OR Napalm OR effective-Charge), AND any bull event fires this bar, AND > tnt_MIN_SIG_GAP since last."
    offset: 0
    plot_call: "(no direct plot — folded into det_bullTNT consolidated)"
    pine_source_line_range: "L626-L658"
    notes: "Bear-event log clears when a bull event fires (and vice versa)."
  - id: b2b-pup::TNT2_BEAR
    family: tnt-super
    plain_english: "Mirror TNT2_BULL on bear side."
    offset: 0
    plot_call: "(no direct plot)"
    pine_source_line_range: "L626-L658"
  - id: b2b-pup::SuperTNT_BULL
    family: tnt-super
    plain_english: "Super-TNT bull: raw bull TNT AND bear Charge on the same bar."
    boolean_summary: "det_bullTNT_raw AND det_bearCharge"
    offset: 0
    plot_call: "(no direct plot — folded into det_bullTNT)"
    pine_source_line_range: "L661"
  - id: b2b-pup::SuperTNT_BEAR
    family: tnt-super
    plain_english: "Mirror SuperTNT_BULL on bear side."
    offset: 0
    plot_call: "(no direct plot — folded into det_bearTNT)"
    pine_source_line_range: "L662"
  - id: b2b-pup::TNT_CONS_BULL
    family: tnt
    plain_english: "Consolidated bull TNT (matches TNT OD output): raw OR TNT 2.0 OR super-TNT."
    boolean_summary: "det_bullTNT_raw OR det_bullTNT2 OR det_superBullTNT"
    offset: 0
    plot_call: "(no direct plot — feeds S15)"
    pine_source_line_range: "L665"
  - id: b2b-pup::TNT_CONS_BEAR
    family: tnt
    plain_english: "Consolidated bear TNT mirror."
    offset: 0
    plot_call: "(no direct plot — feeds S15)"
    pine_source_line_range: "L666"
