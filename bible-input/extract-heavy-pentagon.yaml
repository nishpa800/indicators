composites:
  - id: heavy-pentagon::HEAVY_YIN_YANG_BULL
    tier: 1
    plain_english: "Heavy Yin-Yang fires bullish: any P1 directional spike (groupA: Bull RVOL 1x OR Grand Slam OR Bear RVOL 1x OR MOAB) co-occurs with any neutral P2 tier (groupB: Pentagon OR WTC OR Hiroshima), and the displacement engine reads bullish. Structure: (groupA_Bull OR groupA_Bear) AND groupB."
    composition:
      type: AND
      operands:
        - type: OR
          label: "groupA (any P1 directional)"
          operands:
            - "heavy-pentagon::RVOL_1X_BULL"
            - "heavy-pentagon::GRAND_SLAM"
            - "heavy-pentagon::RVOL_1X_BEAR"
            - "heavy-pentagon::MOAB"
        - type: OR
          label: "groupB (any P2 neutral)"
          operands:
            - "heavy-pentagon::PENTAGON"
            - "heavy-pentagon::WTC"
            - "heavy-pentagon::HIROSHIMA"
      direction_gate: dispBull
    offset: 0
    plot_call: 'plotshape(fire_HYYBull,    title="Heavy Yin-Yang Bull",    style=shape.circle, location=location.bottom, size=size.small, color=color.lime,    text="HYY")'
    alertcondition_id: "Heavy Yin-Yang Bull"
    pine_source_line_range: "L278-L283, L293, L381, L422"
    notes: "baseYinYang = (groupA_Bull or groupA_Bear) and groupB. groupA_Bull = sigBullRVOL1x or sigGrandSlam; groupA_Bear = sigBearRVOL1x or sigMOAB; groupB = sigPentagon or sigWTC or sigHiroshima. Direction gate dispBull selects the Bull variant."

