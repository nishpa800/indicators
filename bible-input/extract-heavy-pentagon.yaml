uncertain_or_questions:
  - "Heavy Combo composites use OR-of-roots inside their AND structure (e.g. baseYinYang = (sigBullRVOL1x or sigGrandSlam or sigBearRVOL1x or sigMOAB) and (sigPentagon or sigWTC or sigHiroshima)). The composition.type is recorded as AND because the top-level operator combining the two operand groups is AND, but the operand list flattens the inner ORs — every listed root is a potential contributor, not a required co-occurrence. Downstream consumers should treat operand lists as 'any-of within group, AND across groups' per the helper definitions in L278-L287."
  - "boolean_summary fields for P1 roots paraphrase bb_baseBullish/bb_baseBearish (close>open + bb_positiveDiff>bb_smaDiff) as 'positive price-vs-volume divergence above its SMA' to stay above the σ/SMA implementation level — flag for review if more or less detail is desired at root level."
  - "alertcondition_id values are taken from the second positional argument of alertcondition() (the alert title), since Pine alertcondition has no separate id parameter."
