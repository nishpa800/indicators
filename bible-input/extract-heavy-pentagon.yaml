indicator:
  id: heavy-pentagon
  file: heavy-pentagon/versions/HEAVY_PENTAGON_v1.pine
  branch: claude/organize-indicators-hierarchy-8JDw1
  pine_version: 5
  line_count: 444
  overlay: true
  one_line_purpose: "Canonical RVOL engine; owns 10 RVOL roots and 15 Heavy Combo composites"
  is_canonical_for:
    - "RVOL family roots (SAAB, Kratos, RVOL1x, GrandSlam, MOAB, Pentagon, WTC, Hiroshima, Nagasaki)"
    - "15 Heavy Combo composites"
  consumed_by:
    - "heavy-combo-toggles (lifts 5 base + 15 directional verbatim)"

internal_helpers:
  - name: dispBull / dispBear / noDisp
    purpose: Internal direction classifier; gates Heavy Combo composites into Bull/Bear/Neutral buckets
    pine_source_line_range: "L232-L256, L290"
    notes: "Computed from bar[1] range > σ × strength + bar[0] FVG confirmation. dispBull requires bar[1] bullish candle + range exceeds σ threshold + bar[0] bullish FVG. dispBear is the bearish mirror. noDisp = neither dispBull nor dispBear. Internal FVG detection (bFVG/sFVG) and σ range check (dispCandleMet) are sub-internals of this helper. NOT a root; NOT a composite. Used ONLY by Stage 5 Heavy Combo direction classification."

roots:
  - id: heavy-pentagon::SAAB
    family: rvol
    plain_english: "Bullish bar with normalized price spike in the SAAB/Kratos band (between 0.56× the RVOL-1x threshold and the RVOL-1x threshold)."
    boolean_summary: "Bar confirmed, bullish candle (close>open), positive price-vs-volume divergence above its SMA, and normalized price spike sits in [SAAB/Kratos threshold, RVOL-1x threshold)."
    parameters:
      - name: bb_avgLength
        default: 30
        units: bars
      - name: bb_smaLength
        default: 20
        units: bars
    offset: 0
    plot_call: 'plotshape(fire_SAAB,       title="SAAB",            style=shape.square,       location=location.top,    size=size.tiny,   color=color.lime,    text="SAAB")'
    alertcondition_id: "SAAB"
    pine_source_line_range: "L185, L363, L410"
    pipeline: "P1 Standard RVOL"
    notes: "Lower-band bullish RVOL spike. Threshold scales with chart timeframe via f_saab_kratos_threshold = 0.56 × f_rvol_1x_threshold(tfSec)."

  - id: heavy-pentagon::KRATOS
    family: rvol
    plain_english: "Bearish bar with normalized price spike in the SAAB/Kratos band (Kratos = bearish mirror of SAAB)."
    boolean_summary: "Bar confirmed, bearish candle (close<open), positive price-vs-volume divergence above its SMA, and normalized price spike sits in [SAAB/Kratos threshold, RVOL-1x threshold)."
    parameters:
      - name: bb_avgLength
        default: 30
        units: bars
      - name: bb_smaLength
        default: 20
        units: bars
    offset: 0
    plot_call: 'plotshape(fire_Kratos,     title="Kratos",           style=shape.square,       location=location.bottom, size=size.tiny,   color=color.orange,  text="Krat")'
    alertcondition_id: "Kratos"
    pine_source_line_range: "L186, L364, L411"
    pipeline: "P1 Standard RVOL"
    notes: "Lower-band bearish RVOL spike. Mirror of SAAB."

  - id: heavy-pentagon::RVOL_1X_BULL
    family: rvol
    plain_english: "Bullish bar with normalized price spike in the RVOL-1x band (between RVOL-1x threshold and Grand Slam / MOAB threshold)."
    boolean_summary: "Bar confirmed, bullish candle, positive price-vs-volume divergence above its SMA, and normalized price spike sits in [RVOL-1x threshold, Grand Slam/MOAB threshold)."
