        units: bars
      - name: bb_smaLength
        default: 20
        units: bars
    offset: 0
    plot_call: 'plotshape(fire_BearRVOL1x, title="Bear RVOL 1x",    style=shape.xcross,       location=location.bottom, size=size.small,  color=color.red,     text="RV1x-")'
    alertcondition_id: "Bear RVOL 1x"
    pine_source_line_range: "L188, L366, L413"
    pipeline: "P1 Standard RVOL"
    notes: "Mid-band bearish RVOL spike."

  - id: heavy-pentagon::GRAND_SLAM
