      - name: bb_smaLength
        default: 20
        units: bars
    offset: 0
    plot_call: 'plotshape(fire_BullRVOL1x, title="Bull RVOL 1x",    style=shape.xcross,       location=location.bottom, size=size.small,  color=color.green,   text="RV1x+")'
    alertcondition_id: "Bull RVOL 1x"
    pine_source_line_range: "L187, L365, L412"
    pipeline: "P1 Standard RVOL"
    notes: "Mid-band bullish RVOL spike."

  - id: heavy-pentagon::RVOL_1X_BEAR
    family: rvol
    plain_english: "Bearish bar with normalized price spike in the RVOL-1x band."
    boolean_summary: "Bar confirmed, bearish candle, positive price-vs-volume divergence above its SMA, and normalized price spike sits in [RVOL-1x threshold, Grand Slam/MOAB threshold)."
    parameters:
      - name: bb_avgLength
