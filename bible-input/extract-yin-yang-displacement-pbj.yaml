cross_indicator_dependencies:
  - "PB (Pullback) and PBJ (Pullback-Joyride) are locally redefined in SECTION 3 (L622-761) using the OKEH Zoo Supertrend + lander array system. This is NOT pulled from hvd-pbj-ppd; the architecture is self-contained here."
  - "Displacement in SECTION 2 (L124-152, isBullishFVG/isBearishFVG + stdev range) is a local interpretation using standard FVG geometry. It is distinct from Pipeline-A HVD in hvd-pbj-ppd (which uses rank-tier volume filtering). This DISP is a simpler 'large range + FVG' detector."
  - "SwingHigh/SwingLow/Breakout/Breakdown/Rejection are locally copied from YIN_YANG_OG_MOFO (SECTION 1, L4-120) with identical logic."
  - "No explicit import or cross-indicator reference to hvd-pbj-ppd or pb-pbj in this file. PB and PBJ roots are fully self-defined."

uncertain_or_questions:
  - "No mentions of 'floor', 'roof', 'rooftop', 'penthouse', '2nd floor', 'ping pong', or related named concepts found in this file."
  - "Displacement offset=-1 vs PBJ offset=0: Displacement fires on bar N to signal bar N-1's displaced range (offset=-1 plotshape). PB/PBJ fire on bar N describing bar N (offset=0, no plot offset). This asymmetry may lead to plotting position misalignment; verify this is intentional."
  - "2-way and 3-way combo event tracking: evtSwingLow, evtSwingHigh, evtBullDisp, evtBullPBJ, evtBullPB (L366-390) are never reset. Over a multi-month backtest, old event bars can remain in scope and falsely trigger combos if they fall within comboWindow. Consider adding time-decay or explicit reset logic to event vars."
  - "Catch-all alerts (L578-579) fire on any_bull or any_bear (aggregate of all 2-way + 3-way combos). These are convenient for macro-alerts but may create alert fatigue if multiple combos fire near each other."

