uncertain_or_questions:
  - "CRITICAL ASYMMETRY — Line 138 (bull): b1_seqEv fires when b1_len >= 2 AND b1_sum >= 0.1. Line 239 (bear): b4_seqEv fires when b4_len >= 2 AND b4_sum >= 0.5. This is a 5x difference in RVOL threshold (0.1 vs 0.5) between bull and bear FC clusters. This may be intentional directional bias (bears require stronger confirmation) OR a corruption artifact from the 58% size reduction. Recommend flagging for Anish verification."

  - "POSSIBLE DEAD CODE in bear overlap logic — Line 224 defines b4_neg as (b4_diff > 0 AND bodyDn) ? b4_diff : na, which already gates on bodyDn. Then line 226 re-applies the bodyDn check: b4_base = bodyDn AND nz(b4_neg) > nz(b4_smaN). This double-gate is redundant and differs from the bull side (line 125: b1_base = bodyUp AND nz(b1_pos) > nz(b1_smaP), where b1_pos is NOT pre-gated on bodyUp). This inconsistency may indicate manual compression artifacts."

  - "E3 DEFINITION: E3 = 'Entry on 3rd bar of session', fires on bar 3 if (MB OR RE OR TA) appears on each of bars 0, 1, 2. Simple recency logic with no state machine or window overlap. Is this the intended 'third bar entry' signal, or should there be additional clustering conditions (like FC's overlap check)?"

  - "F2 DEFINITION: F2 = 'First Two MB', fires on bar 2 of session if bull_MB on bars 0 and 1. Strictly MB-only (not MBRETA), unlike FC's 2-of-3 flexibility. Confirm: is this intentional simplicity, or should F2 also accept RE/TA?"

  - "FC vs E3 vs F2 naming ambiguity — The doc comment (lines 4-6) refers to 'S1. Bullish FC Cluster | S2. Bullish E3 | S3. Bullish First Two MB'. FC = 'First Cluster'? E3 and F2 are session-bar indexed (3rd bar, 2nd bar), but FC has no session-bar dependency and uses complex overlap state. Consider clarifying naming to avoid confusion with other indicator families."

  - "RVOL accumulation peculiarity — In bull FC (line 130-138), b1_sum accumulates only while b1_uBar is true (unconfirmed bars passing base check). Once b1_uBar becomes false, b1_sum resets to 0. This means the 0.1 threshold is evaluated only after a gap (barstate where b1_uBar was false). Is this intended as a 'cooldown' or is it another compression artifact? Bear side uses identical logic with 0.5 threshold."

  - "BARSTATE GATING — b1_thEv includes barstate.isconfirmed (line 127), while b1_uBar does not (line 128). This means the threshold event (recording price-spike window) fires only on confirmed bars, but the sequence event (overlap detection trigger, line 138) requires barstate.isconfirmed AND b1_len >= 2 AND b1_sum >= 0.1. Could create multi-bar lag or race conditions during rapid price moves."

  - "ARRAY RETENTION WINDOWS — Both bull and bear FC use 20-bar max retention for threshold and sequence event windows (lines 149-157, 250-258). Is 20 bars the correct lookback for session-bar-indexed clusters, or should it be tied to inSession windows (reset on day boundary)?"

  - "UNUSED HELPERS — The code defines inRng (lines 126, 227) as a sanity-check function (v > 2.9 && v < 1e6), but the lower bound (2.9) is never justified in comments. Is this a magic number from the original uncompressed version, or a red flag?"

  - "SESSION BAR COUNTER DISCONTINUITY — sessBar (lines 77-87) counts bars within NY session (0930-1600 ET). If market gaps or drops out of session mid-trading, sessBar resets. This could cause E3 and F2 to misfire if e.g. trading halts at bar 2 then resumes. No explicit handle for after-hours or pre-market."

  - "TITLE '58% REDUCTION' indicates aggressive code compression (likely minification, variable renaming, logic folding). Anish suspects root corruption. Recommend comparing against canonical uncompressed version if available (likely in parent directory or earlier branch) to verify: (1) all six atoms (MB/RE/TA x bull/bear) match original thresholds, (2) FC overlap state machine logic preserved, (3) E3/F2 session-bar indexing intact."

