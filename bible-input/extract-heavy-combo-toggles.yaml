uncertain_or_questions:
  - "Verbatim-lift verdict: VERBATIM. Spot-checks pass: (a) displacement engine L192-L207 here matches heavy-pentagon L236-L256 (same disp_strength=6.0 default, same disp_lookback=100, same threshPct=2 default, same auto=true, same FVG formulas, same dispCandleMet, same dispBull/dispBear); (b) base combos L213-L221 here match heavy-pentagon L278-L287 character-for-character (groupA_Bull, groupA_Bear, groupB, baseYinYang, baseNagasaki, baseNagasakiV, baseTrident, baseNHx2); (c) noDisp L223 matches heavy-pentagon L290; (d) all 15 directional booleans L226-L244 match heavy-pentagon L293-L315; (e) P1/P2/P3 thresholds and tier formulas (L83-L186) match heavy-pentagon helpers and pipeline definitions. SAAB/Kratos sigs are still computed here (L147-L148) but unused — they are not part of any Heavy Combo, consistent with heavy-pentagon."
  - "Line count noted as 268 (file ends at L268 per Read; CHANGELOG describes 14,346-byte file but Pine source has 268 lines including blank tail)."
  - "No new roots introduced. The 3 master plots are pure OR-toggles over heavy-pentagon's existing 15 named heavy-combo composites — modeled here as composition.type=OR_TOGGLED with explicit gate_inputs (the en_* checkboxes)."
  - "SAAB / Kratos / RVOL1x / Grand Slam / MOAB / Pentagon / WTC / Hiroshima / Nagasaki tier booleans are computed but have NO standalone plotshape in this indicator (CHANGELOG confirms). Only the 3 master OR-gates are plotted."
