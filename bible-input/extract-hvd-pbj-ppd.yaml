  file: hvd-pbj-ppd/versions/HVDPBJPPD_2026-05-10_THE_ONLY_ONE.pine
  branch: claude/add-txt-indicator-format-b4FUu
  pine_version: 5
  line_count: 1767
  overlay: true
  one_line_purpose: "Canonical PBJ/PPD/PB/Displacement engine; consolidated 'THE_ONLY_ONE' build with four decoupled pipelines (A=HV+D, B=PBJ/PB, C=USE 45-signal alarm, D=Triple AND co-occurrence) plus a Back-to-Back HV+D section"
  is_canonical_for:
    - "PBJ"
    - "PB"
    - "PUP"
    - "PPD"
    - "Displacement (DISP)"
    - "HV+D (volume rank ∧ disp ∧ FVG primitive)"
    - "HV ladder tiers exposed standalone (HV5K/HVY/HVQ inside GZI; HV75/HV150/HV500/HV1000 in USE engine)"
  predecessor: "HVDPBJPPD_4.26.1244am_PPD_UC_RVOL_2026-05-05.pine"
  predecessor_relationship: "drifted-subset — current is a tightened consolidation: 1767 vs 1939 lines, 59 vs 58 plotshapes; 4.26 file is older fragmented variant. The 2026-05-10 build adds the formalized 4-pipeline architecture, the new B2B HV+D section (6 toggles) and the explicit Pipeline-D triple AND. CHANGELOG calls it the canonical build superseding the predecessor."

internal_helpers:
  - name: Supertrend (Zoo ST)
    purpose: "Trend direction (st_dir ±1) used inside Pipeline B (PBJ/PB engine) — `zoo_st_period=10`, `zoo_st_mult=2.0`."
    notes: "Internal to PBJ/PB roots; NOT a separate root."
  - name: Zoo MA (VWMA)
    purpose: "Base MA for the PBJ/PB lander system (`zoo_ma_type=VWMA`, `zoo_ma_len=5`)."
    notes: "Internal to PBJ/PB roots; NOT a separate root."
  - name: PB&J filter (pbj_buy / pbj_sell)
    purpose: "ATR-pullback gate on lowest-low / highest-high over 25 bars + volume>SMA*0.1; gates `wait_pbj_*` flags consumed by buy/sell crosses."
    notes: "Internal to PBJ root; do NOT decompose."
  - name: PB lander (lvl array)
    purpose: "Maintains an array of `lvl` boxes derived from buy/sell crosses + reaccel events; `f_check_approach` sets `wait_buy/sell` consumed by the PB cross."
    notes: "Internal to PB root."
  - name: ATR (atr14)
    purpose: "Shared 14-period ATR for displacement, PB lander box sizing, and PBJ ATR threshold."
    notes: "Internal helper."
  - name: Stdev range (ta.stdev of |O-C| or H-L)
    purpose: "Volatility yardstick used by all displacement primitives (D1/D2/D3 in Pipeline A and Engine 3 in Pipeline C)."
    notes: "Internal helper."
  - name: BB normalized price/volume (bb_normalizedPrice, bb_normalizedVolume)
    purpose: "Spike size and volume normalized vs 30-bar SMA, drives RVOL tier classification (SAAB/Kratos/1x/GS/MOAB/Pentagon)."
    notes: "Internal to RVOL tier classification (Pipeline C engine 1)."
  - name: TradingView/ta/7 relativeVolume (regular + cumulative)
    purpose: "Imported library used to build relVolRatio (WTC/Hiroshima) and ls_regRatio/ls_cumRatio (Long/Short engine)."
    notes: "Internal helper."
  - name: Boom Hunter Ehlers filter (HP/Filt/Quotient1..3, wt1/wt2)
    purpose: "Multi-stage Ehlers band-pass + traditional CCI hybrid producing `bh_anyOmega` etc."
    notes: "Internal to Omega Long composite — NOT a separate root."
  - name: Ping Pong SR engine (srLevels array, swings, body-flat detect)
    purpose: "Maintains support/resistance levels; emits `bull_pp` / `bear_pp` floor/ceiling state booleans."
    notes: "Internal to Floor/Rooftop/2F/Penthouse composites."
  - name: FAUNA NRA core (MB/RE/TA/GG patterns)
    purpose: "ATR/body/range/volume hybrid emitting sigFAUNABull/Bear with TR/ES/GDR/GG exclusions."
    notes: "Internal to many composites; not exposed as a standalone plot here."

roots:
  - id: hvd-pbj-ppd::HVD_BULL
    family: hv
    plain_english: "Pipeline-A primitive: prior bar was a high-volume bar (one of the toggled rank tiers 50–1000 base, or HTF profile rank, or all-time HEV) AND prior bar's range exceeded stdev*mult AND a bullish FVG opened on the current bar. Fires on bar N to describe bar N-1; plotted with offset=-1."
    boolean_summary: "hvd_fire_bull = base_combo_bull or htf1_combo_bull or htf2_combo_bull"
    parameters:
      - { name: d1_std_len, default: 100, units: bars }
      - { name: d1_mult, default: 5.0, units: stdev_multiplier }
      - { name: d2_mult, default: 2.5, units: stdev_multiplier }
      - { name: d3_mult, default: 1.5, units: stdev_multiplier }
      - { name: base_rank_tiers, default: "50,75,100,150,200,250,300,350,400,450,500,550,600,650,700,750,1000+HEV", units: bars_lookback }
      - { name: htf1_tiers, default: "5,10,20,25,30,40,50,60,70,75,80,90", units: bars_lookback }
      - { name: htf2_tiers, default: "5,10,20,25,30,40,50,60,70,75,80,90", units: bars_lookback }
    offset: -1
    plot_call: "plotshape(en_hvd_bull and hvd_fire_bull, \"HV+D Bull\", shape.triangleup,   location.belowbar, color.new(#00E676, 0), text=\"HV+D\", textcolor=color.white, size=size.small, offset=-1)"
    alertcondition_id: null
    pine_source_line_range: "L112-L273, plot L1311"
    notes: "Composite of three internal primitives (volume-rank, stdev displacement, FVG) but treated as a single root per definition. Internal: ta.highest(volume,N), ta.stdev range, FVG geometry. Plot offset=-1; alert at L1326 (excludes co-occurrence cases)."

  - id: hvd-pbj-ppd::HVD_BEAR
    family: hv
    plain_english: "Bear mirror of HVD_BULL: prior bar high-volume rank ∧ prior bar disp ∧ bearish FVG. Pipeline A terminal output."
    boolean_summary: "hvd_fire_bear = base_combo_bear or htf1_combo_bear or htf2_combo_bear"
    parameters:
      - { name: see_HVD_BULL, default: same, units: same }
    offset: -1
    plot_call: "plotshape(en_hvd_bear and hvd_fire_bear, \"HV+D Bear\", shape.triangledown, location.abovebar, color.new(#FF1744, 0), text=\"HV+D\", textcolor=color.white, size=size.small, offset=-1)"
    alertcondition_id: null
    pine_source_line_range: "L112-L273, plot L1312"
    notes: "Same internals as HVD_BULL with reversed FVG/displacement direction. Alert at L1328."

  - id: hvd-pbj-ppd::PBJ_BULL
    family: candle
    plain_english: "Pipeline-B bullish PBJ landing: a Supertrend buy_cross (Zoo VWMA-5 vs ATR-band Supertrend) coincident with the PB&J filter (low<EMA20*(1-ATR/close*3) AND low==25-bar lowest AND volume>SMA20*0.1)."
    boolean_summary: "sigBullPBJ = conf and ta.crossover(close, st_signal_line) and wait_pbj_buy"
    parameters:
      - { name: zoo_ma_type, default: VWMA, units: enum }
      - { name: zoo_ma_len, default: 5, units: bars }
      - { name: zoo_st_period, default: 10, units: bars }
      - { name: zoo_st_mult, default: 2.0, units: atr_multiplier }
      - { name: zoo_pbj_ma_period, default: 20, units: bars }
      - { name: zoo_pbj_atr_period, default: 14, units: bars }
      - { name: zoo_pbj_hh_ll, default: 25, units: bars }
      - { name: zoo_pbj_atr_mult, default: 3.0, units: multiplier }
      - { name: zoo_pbj_vol_period, default: 20, units: bars }
      - { name: zoo_pbj_vol_mult, default: 0.1, units: multiplier }
    offset: 0
    plot_call: "(no standalone plot; consumed by composites + Pipeline D — see PBJ Bull at L1318 within HV+D co-occurrence at offset=-1, and SUPER/FLOOR/HW etc.)"
    alertcondition_id: null
    pine_source_line_range: "L622-L761"
    notes: "Internal: VWMA + ATR-band Supertrend + PB&J filter. Do NOT decompose into Supertrend/Zoo/VWMA/ATR — those are internal helpers. Pipeline B fires bar N, describes bar N, offset=0. Note: there is no offset=0 standalone plot for sigBullPBJ in this file — it surfaces only via composites and Pipeline D's `hvd_pbj_bull`."

  - id: hvd-pbj-ppd::PBJ_BEAR
    family: candle
    plain_english: "Bear mirror of PBJ_BULL: Supertrend sell_cross + PB&J sell filter (high>EMA20*(1+thresh), high==25-bar highest, volume>SMA20*0.1)."
    boolean_summary: "sigBearPBJ = conf and ta.crossunder(close, st_signal_line) and wait_pbj_sell"
    parameters:
      - { name: see_PBJ_BULL, default: same, units: same }
    offset: 0
    plot_call: "(no standalone plot; surfaces via composites and Pipeline D)"
    alertcondition_id: null
    pine_source_line_range: "L622-L761"
    notes: "Mirror of PBJ_BULL with crossunder/highest/upper-band ATR threshold."

  - id: hvd-pbj-ppd::PB_BULL
    family: candle
    plain_english: "Pipeline-B bullish 'plain' Pullback (PB) landing: Supertrend buy_cross when price has approached a previously-recorded bullish lander box (from a prior cross or reaccel). Fires only when PBJ filter did NOT also fire."
    boolean_summary: "sigBullPB = conf and enable_PB and (buy_cross and wait_buy) and not (buy_cross and wait_pbj_buy)"
    parameters:
      - { name: enable_PB, default: true, units: bool }
      - { name: lander_box_atr_mult, default: 0.5, units: atr_multiplier }
