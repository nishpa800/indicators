    notes: "Internal: Zoo lander array `bull_lvls` of `lvl` (upper/lower/vol/approached) populated by f_add_lander on buy_cross and f_add_reaccel on bull_reaccel; f_check_approach sets wait_buy."

  - id: hvd-pbj-ppd::PB_BEAR
