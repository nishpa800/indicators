uncertain_or_questions:
  - "PBJ_BULL/PBJ_BEAR/PB_BULL/PB_BEAR have NO offset=0 standalone plotshape in this file. They surface only via composites (HVD-co-shapes at offset=-1, FLOOR/2F/ROOF/PH, SUPER, HW, etc.) and via Pipeline D. If the bible expects a Pipeline-B standalone plot, it would have to be classified 'no plot — terminal-boolean root only'."
  - "PUP and PPD also have no standalone plot here — they are named primitives consumed only by composites. Listed as roots per the family-instructions ('PUP if defined here'). Confirm whether bible wants them plotted-only or any-named-primitive."
  - "Volume rank tiers (50,75,100,...,1000) inside Pipeline A are NOT individually exposed as separate roots — they roll up into base_combo_bull via the priority ranker. Listed only HV5K/HVY/HVQ (GZI ladder) and HV75/HV150/HV500/HV1000 (USE-side ladder) as named primitives because those names are explicitly emitted as Boolean variables. The Pipeline-A 50/100/150/.../1000 toggles are all internal to the single HVD root."
  - "DISP2 / DISP3 are intermediate primitives used only inside DISP_CONS_BULL2/3; not separately rooted. DISP5 is exposed because HW Bull/Bear depend on it (and uses a hardcoded 5σ which differs from DISP's user-input multipliers)."
  - "Predecessor relationship — assessed as 'drifted-subset' from byte/line counts (1767 vs 1939 lines, 109,787 vs 123,396 bytes) and CHANGELOG header. Did NOT diff the predecessor file in detail per task rules."
  - "Several composite operands listed as bare Pine identifiers (e.g. sigFAUNABull, bull_pp, gz_bullGZI, sigSAAB, sigGrandSlam, sigPentagon, sigWTC, sigHiroshima, sigMOAB, sigKratos, sigBullRVOL1x, sigBearRVOL1x, sigLong1, sigShort1, sigNeoBull, sigTrinityBull) refer to internal USE-engine primitives. They are documented in `internal_helpers` as engines (RVOL/FAUNA/Matrix-Number/Long-Short/GZI). Whether the bible should treat each of those as its own root from this file or only from the dedicated heavy-pentagon/hv-fvg-gz1-og engines is a Stage-1 merge question."
