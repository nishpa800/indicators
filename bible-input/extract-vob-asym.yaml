indicator:
  id: vob-asym
  file: vob-asym/versions/VOB_Asym_T3x6_MutEx_Claude_v8_2026-05-02.pine
  branch: both
  pine_version: 6
  line_count: 1473
  overlay: true
  one_line_purpose: "VOB asymmetric T3 x6 mutex - staged structural ladder with mutually-exclusive state markers (six sensitivity tiers A..F, bullish/bearish zone-creation markers, T3 SUPER signals, Nagasaki ATH-volume, MutEx priority-line drawing)"
  notes: >-
    vob/ folder also contains VOB_LADDER_WATCH_v1.pine - distinct indicator handled by
    a separate agent. Stage 6 splits into vob-asym/ (this file) and vob-ladder-watch/.
    The CHANGELOG entry currently only documents the LADDER_WATCH companion; this
    Asym T3 x6 file is the parent engine the LADDER_WATCH was derived from
    (its f_bull_vob is the bull-only mirror of f_vob here).

internal_helpers:
  - name: level
    kind: udt
    lines: "74-79"
    fields: [indx, upper, lower, mid, vol]
    purpose: "Per-zone record (origin bar time, upper/lower/mid prices, accumulated volume). na fields == invalidated."
  - name: hist_entry
    kind: udt
    lines: "82-86"
    fields: [t, vol, pct, date_s]
    purpose: "Historical event record used by audit/T3 tables (timestamp, vol, pct of pool, formatted date string)."
  - name: f_cd_ok
    kind: function
    lines: "396-397"
    signature: "f_cd_ok(int last_bar, int cd) -> bool"
    purpose: "Cooldown gate - returns true if last_bar is na or bar_index - last_bar > cd."
  - name: f_fmt_vol
    kind: function
    lines: "399-405"
    signature: "f_fmt_vol(float v) -> string"
    purpose: "Formats volume as M/K abbreviated string."
  - name: f_zones_overlap
    kind: function
    lines: "407-408"
    signature: "f_zones_overlap(float lo1, float hi1, float lo2, float hi2) -> bool"
    purpose: "Tests whether two price ranges overlap (na-safe)."
  - name: f_push_hist / f_evt_cell / f_push_t3_hist / f_t3_cell
    kind: functions
    lines: "410-437"
    purpose: "Push events into hist_entry arrays and render Last-N table cells for the audit + T3 tables."
  - name: f_count_active
    kind: function
    lines: "446-452"
    signature: "f_count_active(array<level> arr) -> int"
    purpose: "Counts non-invalidated zones (vol not na) in a level array."
  - name: f_nearest_dist_pct / f_stack_near / f_nearest_above_pct / f_nearest_below_pct / f_nearest_mid / f_nearest_vol
    kind: functions
    lines: "456-531"
    purpose: "Spatial helpers over a level array vs current price - nearest-zone distance %, count of zones within stack threshold %, nearest above/below in %, nearest mid price, nearest vol."
  - name: f_emit_row
    kind: function
    lines: "545-554"
    signature: "f_emit_row(table, int row, string lbl, int sv, float pool, int zcnt, float nd, int stk, float gap, float slope, float nrvol, color rc)"
    purpose: "Renders one tier+direction row of the comprehensive emission table."
  - name: f_vob
    kind: function
    lines: "562-679"
    signature: "f_vob(int len1, array<level> up_lvl, array<level> lo_lvl, float atr_prox, float atr_adj, float sup_mult) -> [bool t3_buy, bool t3_sell, float bp, float sp]"
    purpose: >-
      Core engine (preserved-exactly per file header). On EMA(len1)/EMA(len1+13)
      crossover -> push lower bull zone with accumulated volume from lowest swing;
      on crossunder -> push upper bear zone from highest swing. Dedupes near
      duplicates within atr_prox by overwriting prior slot with all-na level;
      invalidates on close-breach. Returns T3 buy/sell flags (single-zone +
      pool*sup_mult dominance + price-inside-zone) and total bull/bear pool volumes.
  - name: f_count_overlaps / f_draw_zone / f_process_zones
    kind: functions
    lines: "1039-1086"
    purpose: >-
      MutEx priority-line drawing. f_process_zones walks each tier from A (highest)
      down to F (lowest), counting how many already-drawn zones the current zone
      overlaps. Priority 0 (no overlap) draws full top+bottom+mid+fill; priority
      1/2/3 degrade to single midline of varying style. This is the 'mutually
      exclusive' visual: highest-sensitivity tier wins full treatment.
  - name: f_emit_label
    kind: function
    lines: "1109-1115"
    signature: "f_emit_label(bool fire, array<level> arr, string dir, string tier, int sens_val, float pool, float rsi_v, int sess_v, float slope_v)"
    purpose: "Emits a label.new at the new zone's mid carrying pipe-delimited metadata for data_get_pine_labels emission channel."
  - name: f_bloomberg_t3
    kind: function
    lines: "875-876"
    signature: "f_bloomberg_t3(string sig, string tier, int sens_val, string dir, float bp, float sp, float slope_v) -> string"
    purpose: "Builds pipe-delimited Bloomberg-style alert payload string for T3 signals."
  - name: atr_base / atr_proximity / atr_adjust
    kind: shared_constants
    lines: "270-272"
    purpose: "ta.highest(ta.atr(200),200) baseline, *3 = atr_proximity (dedup), *2 = atr_adjust (src clamp inside f_vob). Shared by all six tiers."
  - name: rsi_14 / sess_bar_count / vol_rank / slope_ema_a..f / ema_a..f_fast
    kind: emission_context
    lines: "282-313"
    purpose: "Supplementary market state computed for emission only (do not affect signal logic). RSI14, bars-since-session-open, percentile rank of volume vs 200, per-tier fast EMA slope %."
  - name: upper_a..upper_f / lower_a..lower_f
    kind: persistent_state
    lines: "321-332"
    purpose: "Twelve var arrays of level UDTs - six bear (upper_*) and six bull (lower_*) tiers. Each holds <=15 zones."
  - name: cd_zb_a..cd_zs_f / last_t3_buy_a..last_t3_sell_f / last_nagasaki
    kind: cooldown_state
    lines: "338-355"
    purpose: "Per-signal last-fire bar_index used by f_cd_ok to suppress repeat firings within cooldown_bars."
  - name: hb_a..hs_f / ht3ba..ht3sf / h_nag
    kind: history_state
    lines: "361-390"
    purpose: "hist_entry arrays driving the audit table (zone events) and T3 signal table (signal events). Capped at hist_depth."
  - name: nzb_a..nzs_f
    kind: derived_flags
    lines: "700-705"
    purpose: "Zone-creation booleans - true iff f_vob grew the corresponding array on this bar."
  - name: maxVolEver / isNagasaki
    kind: persistent_state_and_flag
    lines: "750-754"
    purpose: "All-time-high-volume tracker (using volume[1]); isNagasaki fires the bar after a new ATH bar."
  - name: cnt_b*/cnt_s* / nd_b*/nd_s* / nearest_bull_dist / nearest_bear_dist / stk_bull / stk_bear / bull_gap / bear_gap
    kind: emission_metrics
    lines: "713-744"
    purpose: "Aggregated counts, nearest-distance %, stack-near counts, opposing-zone gap % - feed alert payloads, the comprehensive emission table, and log.info streams."
  - name: drawn_lines / drawn_fills / ovlp_bull_lo / ovlp_bull_hi / ovlp_bear_lo / ovlp_bear_hi
    kind: per_bar_state
    lines: "1020-1037"
    purpose: "Cleared each bar; track lines drawn and overlap regions used by the MutEx priority engine."

