composites:
  - id: vob-asym::any_t3
    tier: 1
    kind: derived_flag
    lines: "860"
    depends_on_roots: [T3a-buy, T3a-sell, T3b-buy, T3b-sell, T3c-buy, T3c-sell, T3d-buy, T3d-sell, T3e-buy, T3e-sell, T3f-buy, T3f-sell, Nagasaki]
    description: "OR of all 12 T3 signals + Nagasaki - drives the consolidated 'Any T3 Signal or Nagasaki' alertcondition (line 861)."

  - id: vob-asym::any_zone
    tier: 1
    kind: derived_flag
    lines: "1135"
    depends_on_roots: [zA-bull, zA-bear, zB-bull, zB-bear, zC-bull, zC-bear, zD-bull, zD-bear, zE-bull, zE-bear, zF-bull, zF-bear]
    description: "OR of all 12 zone-creation flags - drives the 'Any Zone Formation' alertcondition (line 1136) and the Bloomberg ZONE_FORMATION alert payload (lines 1138-1164)."

  - id: vob-asym::mutex_zone_lines
    tier: 2
    kind: zone_drawing
    lines: "1020-1086"
    depends_on_roots: [zA-bull, zA-bear, zB-bull, zB-bear, zC-bull, zC-bear, zD-bull, zD-bear, zE-bull, zE-bear, zF-bull, zF-bear]
    description: >-
      Mutually-exclusive overlap engine. Each bar redraws all zones from
      lower_*/upper_* arrays in tier-priority order A->B->C->D->E->F. f_process_zones
      tracks already-drawn overlap rectangles and asks f_count_overlaps how many
      hits the current zone has - 0 = full top+bottom+mid+fill, 1 = solid mid only,
      2 = dotted mid w2, 3+ = dotted mid w1. Bull and bear streams tracked
      separately. This is the 'mutually exclusive state markers' the indicator
      name promises.
    rendered_in: "Chart price layer - lines and linefills, persisted via drawn_lines/drawn_fills arrays cleared each bar."

  - id: vob-asym::bull_pool / bear_pool (per-tier)
    tier: 2
    kind: derived_scalar_set
    lines: "627-651, 692-697 (returned as bp/sp)"
    depends_on_roots: [zA-bull, zA-bear, zB-bull, zB-bear, zC-bull, zC-bear, zD-bull, zD-bear, zE-bull, zE-bear, zF-bull, zF-bear]
    description: >-
      bpa..bpf and spa..spf - per-tier sums of vol across active bull/bear zones.
      Direct outputs of f_vob. Used as denominators in T3 dominance test, in
      Bloomberg alert payloads, in emission table rows, in log.info stream, and
      in audit-table pct% computations.

  - id: vob-asym::cnt_bull_all / cnt_bear_all
    tier: 2
    kind: derived_scalar
    lines: "713-720"
    depends_on_composites: [bull_pool / bear_pool (per-tier)]
    description: "Total active-zone counts across all six tiers each side. Surfaced in TOTALS row of emission table (1245) and BULLZONES/BEARZONES alert fields."

  - id: vob-asym::nearest_bull_dist / nearest_bear_dist
    tier: 2
    kind: derived_scalar
    lines: "722-732"
    depends_on_roots: [zA-bull, zA-bear, zB-bull, zB-bear, zC-bull, zC-bear, zD-bull, zD-bear, zE-bull, zE-bear, zF-bull, zF-bear]
    description: "Across all tiers, min distance % from close to any active bull/bear zone mid (-1 if none). Surfaced in TOTALS row, alerts, log stream."

  - id: vob-asym::stk_bull / stk_bear
    tier: 2
    kind: derived_scalar
    lines: "734-735"
    depends_on_roots: [zA-bull, zA-bear, zB-bull, zB-bear, zC-bull, zC-bear, zD-bull, zD-bear, zE-bull, zE-bear, zF-bull, zF-bear]
    description: "Sum across tiers of zones whose mid is within stack_thresh_pct % of close. >=3 colors lime in tables - the 'stacking near price' confluence indicator."

  - id: vob-asym::bull_gap / bear_gap
    tier: 2
    kind: derived_scalar
    lines: "737-744"
    depends_on_roots: [zA-bull, zA-bear, zB-bull, zB-bear, zC-bull, zC-bear, zD-bull, zD-bear, zE-bull, zE-bear, zF-bull, zF-bear]
    description: "Min % distance from close to nearest opposing zone above (bull_gap) or below (bear_gap). 'Room to run' before hitting resistance/support."

  - id: vob-asym::pancake_bull / pancake_bear
    tier: 3
    kind: composite_flag_string
    lines: "1275-1276"
    depends_on_composites: [stk_bull / stk_bear, bull_gap / bear_gap]
    description: >-
      'YES - HIGH CONVICTION BULL/BEAR PANCAKE' when stk_*>=3 and gap>=30%;
      'PARTIAL' if stacked but gap<30; else 'NO'. Rendered in PANCAKE row of
      emission table (1277-1285). The named composite confluence the indicator
      surfaces for human + Claude reads.

  - id: vob-asym::any_t3_alert
    tier: 3
    kind: alertcondition
    lines: "861"
    depends_on_composites: [any_t3]
    description: "Single alertcondition consolidating all 13 T3+Nagasaki triggers; saves alertcondition slot budget."

  - id: vob-asym::any_zone_alert
    tier: 3
    kind: alertcondition
    lines: "1136"
    depends_on_composites: [any_zone]
    description: "Single alertcondition for any of 12 zone-formation events."

  - id: vob-asym::T3_bloomberg_alert
    tier: 3
    kind: alert_payload
    lines: "875-904"
    depends_on_roots: [T3a-buy, T3a-sell, T3b-buy, T3b-sell, T3c-buy, T3c-sell, T3d-buy, T3d-sell, T3e-buy, T3e-sell, T3f-buy, T3f-sell, Nagasaki]
    depends_on_composites: [bull_pool / bear_pool (per-tier), cnt_bull_all / cnt_bear_all, stk_bull / stk_bear, bull_gap / bear_gap, nearest_bull_dist / nearest_bear_dist]
    description: >-
      Per-T3-fire alert() with pipe-delimited Bloomberg-format payload built by
      f_bloomberg_t3 - includes ticker, exchange, TF, signal, tier, sens, dir,
      close, vol, vol-rank, RSI, sess bar, both pools, all aggregate metrics, and
      EMA slope. Nagasaki has its own simpler payload at line 904.

  - id: vob-asym::ZONE_FORMATION_bloomberg_alert
    tier: 3
    kind: alert_payload
    lines: "1138-1164"
    depends_on_composites: [any_zone, bull_pool / bear_pool (per-tier), cnt_bull_all / cnt_bear_all, stk_bull / stk_bear, bull_gap / bear_gap, nearest_bull_dist / nearest_bear_dist]
    description: "On any_zone, emits ZONE_FORMATION pipe-delimited alert with all aggregate metrics plus a comma-list ZONES: tag enumerating which tier+direction(s) fired this bar."

  - id: vob-asym::zone_formation_label
    tier: 3
    kind: emission_label
    lines: "1109-1128"
    depends_on_roots: [zA-bull, zA-bear, zB-bull, zB-bear, zC-bull, zC-bear, zD-bull, zD-bear, zE-bull, zE-bear, zF-bull, zF-bear]
    description: >-
      Per-zone-birth label.new at the new zone's mid, carrying
      'DIR|TIER|SENS:.|VOL:.|POOL:.|RSI:.|SESS:.|SLOPE:.' metadata for the
      data_get_pine_labels emission channel. Gated by en_emission_labels.

  - id: vob-asym::log_emission_stream
    tier: 4
    kind: log_stream
    lines: "1174-1192"
    depends_on_composites: [bull_pool / bear_pool (per-tier), cnt_bull_all / cnt_bear_all, stk_bull / stk_bear, bull_gap / bear_gap, nearest_bull_dist / nearest_bear_dist]
    description: >-
      log.info VOB_EMISSION pipe-delimited per-confirmed-bar stream for the
      pine_get_console channel. 34 fields including all six per-tier bull/bear
      pools and slope_ema_a..f.

  - id: vob-asym::comprehensive_emission_table
    tier: 4
    kind: dashboard
    lines: "1202-1285"
    depends_on_roots: [zA-bull, zA-bear, zB-bull, zB-bear, zC-bull, zC-bear, zD-bull, zD-bear, zE-bull, zE-bear, zF-bull, zF-bear]
    depends_on_composites: [bull_pool / bear_pool (per-tier), cnt_bull_all / cnt_bear_all, stk_bull / stk_bear, bull_gap / bear_gap, nearest_bull_dist / nearest_bear_dist, pancake_bull / pancake_bear]
    description: >-
      Top-left 9x20 table on barstate.islast - headers + DEFINITIONS legend row +
      12 tier-direction data rows (f_emit_row) + TOTALS row + MARKET snapshot
      (RSI, sess, vol, vrank, ATH, close) + INPUTS row + PANCAKE row. The
      'richest single source of truth' per file comments.

  - id: vob-asym::audit_table
    tier: 4
    kind: dashboard
    lines: "1296-1381"
    depends_on_roots: [zA-bull, zA-bear, zB-bull, zB-bear, zC-bull, zC-bear, zD-bull, zD-bear, zE-bull, zE-bear, zF-bull, zF-bear, Nagasaki]
    description: >-
      Audit table at user-positioned location showing Last 1/2/3 zone events per
      tier+direction (pulled from hb_*/hs_* hist arrays via f_evt_cell), plus a
      NAG row for the most recent Nagasaki events. Date string + abbreviated vol
      + rounded pct of pool.

  - id: vob-asym::T3_signal_table
    tier: 4
    kind: dashboard
    lines: "1388-1473"
    depends_on_roots: [T3a-buy, T3a-sell, T3b-buy, T3b-sell, T3c-buy, T3c-sell, T3d-buy, T3d-sell, T3e-buy, T3e-sell, T3f-buy, T3f-sell, Nagasaki]
    description: >-
      Bottom-left 5x15 table - Last 1/2/3 events for each of 12 T3 signals plus
      NAG row plus an ATH row showing maxVolEver. f_t3_cell-based.

cross_indicator_dependencies:
  - target: vob-ladder-watch
    relationship: parent_engine_donor
    notes: >-
      VOB_LADDER_WATCH_v1.pine derives its f_bull_vob (lines 59-85 there) by
      mirroring this file's f_vob (lines 562-679 here) with the bear half and
      T3/MutEx logic stripped. The ladder-watch's zA..zF roots conceptually map
      onto this file's zA-bull..zF-bull roots, but the two indicators run
      independent state arrays (no live data sharing inside Pine).
  - target: external (TradingView alert engine)
    relationship: alert_consumer
    notes: >-
      Two alertcondition() entries (lines 861, 1136) plus 13 alert() calls for
      T3+Nagasaki (lines 879-904) plus one zone-formation alert() (line 1164)
      expect TradingView 'Any alert() function call' wiring.
  - target: external (Claude Code MCP readers)
    relationship: emission_consumer
    notes: >-
      File is explicitly designed to emit through six MCP channels
      (data_get_study_values disabled - plot budget consumed; data_get_pine_labels
      via f_emit_label; data_get_pine_tables via comprehensive emission table;
      pine_get_console via log.info; alert() via Bloomberg-format strings;
      data_get_pine_lines via MutEx zone lines). See file header comments
      54-64 and 1090-1099.

uncertain_or_questions:
  - q: >-
      The CHANGELOG (/home/user/indicators/vob/CHANGELOG.md) has only one entry,
      for VOB_LADDER_WATCH_v1.pine on 2026-05-04. There is no CHANGELOG entry
      for this file (VOB_Asym_T3x6_MutEx_Claude_v8 dated 2026-05-02 in its
      filename). Treat that as 'changelog covers companion only' rather than
      missing data.
    severity: info
  - q: >-
      The MutEx priority engine in f_process_zones (1075-1086) is called with
      tiers in order A,B,C,D,E,F bull then A,B,C,D,E,F bear. Earlier-pushed
      tiers (A) get full visual; later (F) get degraded. This is the named
      'mutually exclusive' contract - confirmed by file header comment 39-43.
      No ambiguity, but worth flagging that 'priority' here is by tier letter
      (A wins) not by zone freshness or volume.
    severity: info
  - q: >-
      f_vob's dedup-by-overwrite-with-na pattern (lines 602, 616) plus the
      arr.shift() size cap at 15 (lines 605-606, 619-620) could in theory evict
      an active zone if 15 mostly-na slots accumulate before a real zone is
      pushed. Inherited characteristic also flagged in vob-ladder-watch extract.
    severity: low
  - q: >-
      Each tier exposes a SINGLE bull and SINGLE bear zone-creation marker root
      (zA-bull, zA-bear, etc.) per the LCD rule - even though f_vob can push
      multiple zones per tier-array over time. The named primitive is the
      birth-event boolean (fire_zb_*/fire_zs_*), not the zone object itself.
      Down-stream composites that need zone-set semantics (pools, counts, gaps)
      are listed as composites depending on the root set.
    severity: info
  - q: >-
      The indicator name 'VOB Asym T3 x6' references 'asymmetric' but the
      asym_threshold input (line 140) is documented as RESERVED for future Tier
      1 asymmetric signals; T3 uses super_mult only. So the 'asymmetric' in the
      name currently refers to the file's six-tier ladder topology rather than
      a separate asym signal.
    severity: info
