indicator:
  id: vob-ladder-watch
  file: vob-ladder-watch/versions/VOB_LADDER_WATCH_v1.pine
  branch: both
  pine_version: 5
  line_count: 215
  overlay: true
  one_line_purpose: "Staged zF -> zA ascending bull-zone ladder escalation detector (depth 0-6 watch gauge + alerts)"

internal_helpers:
  - name: level
    kind: udt
    lines: "27-32"
    fields: [indx, upper, lower, mid, vol]
    purpose: "Per-zone record (bar index, upper/lower/mid prices, cumulative volume) used by every tier's bull-zone array."
  - name: f_bull_vob
    kind: function
    lines: "59-85"
    signature: "f_bull_vob(int len1, array<level> arr, float atr_prox, float atr_adj)"
    purpose: "Core bull VOB engine — mirrors VOB Asym T3's bull half. On EMA(len1)/EMA(len1+13) crossover (confirmed bar) finds the lowest low in window, builds a level (clamped src vs lowest by atr_adj), pushes onto arr. Then deduplicates near-duplicate mids within atr_prox, invalidates zones whose lower is breached by close, caps array size at 15."
  - name: f_top_active
    kind: function
    lines: "96-104"
    signature: "f_top_active(array<level> arr) -> float"
    purpose: "Returns the highest mid-price among non-na levels in the array (i.e. the most-recent / topmost active bull zone for that tier)."
  - name: f_zone_cell
    kind: function
    lines: "195-201"
    signature: "f_zone_cell(table t, int row, string lbl, float p, color tc)"
    purpose: "Renders a 2-column row in the depth gauge table — tier label cell + price cell (or em-dash if na)."
  - name: atr_base / atr_proximity / atr_adjust
    kind: shared_constants
    lines: "46-48"
    purpose: "ATR(200) highest-of-200 baseline, *3 for zone-proximity dedup, *2 for src clamp inside f_bull_vob — shared across all six tiers."
  - name: bull_a / bull_b / bull_c / bull_d / bull_e / bull_f
    kind: persistent_state
    lines: "51-56"
    purpose: "Per-tier var arrays of level UDTs (bull zones), one per sensitivity (A=2500..F=1000)."
  - name: p_a / p_b / p_c / p_d / p_e / p_f
    kind: derived_scalars
    lines: "106-111"
    purpose: "Per-tier 'top active zone mid' price; the named primitives the ladder walks."
  - name: ladder_depth
    kind: derived_scalar
    lines: "117-135"
    purpose: "Walks F->E->D->C->B->A and counts consecutive strictly-ascending non-na tier prices. 0=no zF, max 6."
  - name: prev_depth / escalated / de_escalated
    kind: state_and_flags
    lines: "138-142"
    purpose: "Tracks ladder_depth across confirmed bars; escalated fires when depth increases."
  - name: fire_watch / fire_tier3 / fire_tier4 / fire_tier5 / fire_full
    kind: derived_flags
    lines: "151-155"
    purpose: "One-shot escalation flags gated by (escalated AND ladder_depth == N). Used by both plotshape and alertcondition."

roots:
  - id: vob-ladder-watch::zF
    family: structural
    name_in_pine: "p_f"
    tier_letter: F
    sensitivity_default: 1000
    lines:
      input: "40"
      array: "56"
      engine_call: "92"
      derived_price: "111"
      table_render: "210"
    description: "Sensitivity-F (lowest / longest EMA pair: len=1000, paired ema 1013) bull VOB zone — top active mid-price. The ladder's anchor; if na the ladder is depth 0."
    output:
      kind: scalar_price
      symbol: p_f
    uses_helpers: [f_bull_vob, f_top_active, level, atr_base, atr_proximity, atr_adjust]

  - id: vob-ladder-watch::zE
