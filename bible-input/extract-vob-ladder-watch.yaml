composites:
  - id: vob-ladder-watch::ladder_depth
    tier: 1
    kind: derived_scalar
    lines: "117-135"
    depends_on_roots: [zF, zE, zD, zC, zB, zA]
    description: >-
      Counts consecutive strictly-ascending non-na tier mids walking F->E->D->C->B->A.
      Range 0..6. Any na or non-strictly-greater tier truncates the ladder at that point.
    rendered_in: "Top-right table 'Depth N/6' cell (lines 207-209), color-coded gray<2 / yellow 2-3 / lime>=4."

  - id: vob-ladder-watch::escalated
    tier: 2
    kind: edge_event
    lines: "138-142"
    depends_on_roots: []
    depends_on_composites: [ladder_depth]
    description: "True on a confirmed bar where ladder_depth strictly increased vs prev_depth. Drives every plotshape and alert."

  - id: vob-ladder-watch::WATCH
    tier: 3
    kind: escalation_signal
    depth_trigger: 2
    fire_flag: fire_watch
    lines:
      flag: "151"
      plotshape: "157-158"
      alertcondition: "169-170"
    depends_on_composites: [ladder_depth, escalated]
    visual:
      shape: labelup
      location: belowbar
      color_hex: "#FFFF00"
      size: small
      text: "WATCH\\nF+E"
    alert_message: "VOB Ladder reached depth 2 (zF + zE ascending). Ticker on watch."
    description: "First escalation — zF and zE present and ascending. 'Put it on radar' per CHANGELOG rationale."

  - id: vob-ladder-watch::TIER3
    tier: 3
    kind: escalation_signal
    depth_trigger: 3
    fire_flag: fire_tier3
    lines:
      flag: "152"
      plotshape: "159-160"
      alertcondition: "171-172"
    depends_on_composites: [ladder_depth, escalated]
    visual:
      shape: labelup
      location: belowbar
      color_hex: "#FF9800"
      size: normal
      text: "LDR3\\n+D"
    alert_message: "VOB Ladder reached depth 3 (zF + zE + zD ascending). Escalating."

  - id: vob-ladder-watch::TIER4
    tier: 3
    kind: escalation_signal
    depth_trigger: 4
    fire_flag: fire_tier4
    lines:
      flag: "153"
      plotshape: "161-162"
      alertcondition: "173-174"
    depends_on_composites: [ladder_depth, escalated]
    visual:
      shape: labelup
      location: belowbar
      color_hex: "#FF6D00"
      size: normal
      text: "LDR4\\n+C"
    alert_message: "VOB Ladder reached depth 4 (zF..zC ascending). High conviction."

  - id: vob-ladder-watch::TIER5
    tier: 3
    kind: escalation_signal
    depth_trigger: 5
    fire_flag: fire_tier5
    lines:
      flag: "154"
      plotshape: "163-164"
      alertcondition: "175-176"
    depends_on_composites: [ladder_depth, escalated]
    visual:
      shape: labelup
      location: belowbar
      color_hex: "#E91E63"
      size: large
      text: "LDR5\\n+B"
    alert_message: "VOB Ladder reached depth 5 (zF..zB ascending). Strong trend."

  - id: vob-ladder-watch::FULL
    tier: 3
    kind: escalation_signal
    depth_trigger: 6
    fire_flag: fire_full
    lines:
      flag: "155"
      plotshape: "165-166"
      alertcondition: "177-178"
    depends_on_composites: [ladder_depth, escalated]
    visual:
      shape: flag
      location: bottom
      color_hex: "#FFD700"
      size: huge
      text: "FULL\\nLDR"
    alert_message: "VOB Ladder FULL — all 6 tiers ascending zF->zA. Drop everything."
    description: "Maximum escalation — full F->A monotonic ascending stack."

  - id: vob-ladder-watch::escalation_alert_message
    tier: 4
    kind: alert_payload
    lines: "180-191"
    depends_on_composites: [escalated, ladder_depth]
    depends_on_roots: [zA, zB, zC, zD, zE, zF]
    description: >-
      Pipe-delimited alert() payload fired once-per-bar-close on any escalation, encoding
      TICKER, TF, NY-tz TIME, DEPTH, all six tier prices (na safe), and CLOSE. Gated by
      show_alerts input. Companion to the per-tier alertcondition lines.

  - id: vob-ladder-watch::depth_gauge_table
    tier: 4
    kind: dashboard
    lines: "203-215"
    depends_on_composites: [ladder_depth]
    depends_on_roots: [zA, zB, zC, zD, zE, zF]
    description: >-
      Top-right 2x8 table rendered on barstate.islast. Header row shows 'Depth N/6'
      (color-coded by depth threshold). Six body rows show zF..zA labels with current
      top-active mid prices (em-dash when na). Each body row uses f_zone_cell helper.

cross_indicator_dependencies:
  - target: vob-asym-t3
    relationship: shared_engine_lineage
    notes: >-
      f_bull_vob (lines 59-85) is documented in the file header and CHANGELOG as
      mirroring VOB Asym T3's bull half (no T3-smoothing, no MutEx pruning, bull-only).
      No code import — duplicated logic. zF..zA roots here are conceptual cousins of
      VOB Asym T3's six bull tiers but evaluated independently with their own arrays.
  - target: external (TradingView alert engine)
    relationship: alert_consumer
    notes: >-
      Five alertcondition() entries (lines 169-178) plus one alert() call (line 191)
      expect TradingView 'Any alert() function call' wiring per CHANGELOG instructions.

uncertain_or_questions:
  - q: "f_top_active selects the HIGHEST mid-price among active zones, but the comment on line 95 says 'most recent floor'. Are these always the same? In a strictly ascending market the newest zone is also the highest, but if a higher older zone has not been invalidated (close has not breached its lower) the helper would return that older zone, not the newest. May affect ladder semantics in choppy markets."
    severity: low
  - q: "f_bull_vob deduplicates by writing level.new(na, na, na, na, na) into slots (lines 81, 83) rather than removing them; f_top_active correctly skips na mids. But the size cap arr.shift() at line 85 may evict an active zone if the array grows past 15 with mostly-na slots — a known characteristic shared with VOB Asym T3's engine."
    severity: low
  - q: "Stage 6 disambiguation: this file's zA..zF roots share NAMES with VOB Asym T3's bull tiers but are independent computations (different arrays, no T3 smoothing, no cross-tier MutEx). The vob-ladder-watch:: namespace prefix is the disambiguator."
    severity: info
