# ─────────────────────────────────────────────────────────────────
# ROOTS — primitives defined in this file (NEW in tnt-od family)
# ─────────────────────────────────────────────────────────────────
roots:

  # ── Engine outputs (TNT family raw atoms) ──
  - id: tnt-od::TNT
    aka: ["TNT raw", "raw_bullTNT/raw_bearTNT", "Three-engine confluence"]
    family: structural
    line_range: "454-459"
    description: "Three-engine confluence (VOB + ANISH swing-OB + FLUX pullback). Requires temporal-OK across all three confirm bars within CONF_WINDOW (=2*EMA_SLOW), zone overlap between VOB and ANISH zones, plus synergy gate (volume / RSI / slope / overlap-ratio)."
    booleans:
      - name: raw_bullTNT
        line: 458
      - name: raw_bearTNT
        line: 459
    consolidated_into: "det_bullTNT / det_bearTNT (= raw_bullTNT OR raw_bullTNT2 OR raw_superTNTBull)  lines 618-619"
    inputs:
      - SENS (default 100, line 157)
      - SWING_LEN (default 10, line 158)
      - MIN_SIG_GAP = EMA_SLOW (line 250)
    notes: "VOB cross (ema_fast/ema_slow crossover/under) and Anish swing-OB and Flux pullback are sub-engines, not separately plotted. They feed TNT."

  - id: tnt-od::Napalm
    aka: ["NPM", "raw_napalmBull/Bear"]
    family: structural
    line_range: "514-529"
    description: "Displacement (Engine #1: stdev(100)*5 over abs(open-close), bullFVG/bearFVG required) through an OPPOSITE-SIDE active TNT zone. Bullish Napalm: dispBull AND any active bear TNT zone where low[1] > z.level."
    booleans:
      - name: raw_napalmBull
        line: 515
      - name: raw_napalmBear
        line: 515
    consolidated_into: "det_bullNapalm / det_bearNapalm (= raw_napalmBull OR raw_bullCharge)  line 620-621"
    depends_on:
      - "TNT zones (tnt_zones array)"
      - "displacement (dispBull/dispBear, lines 506-512)"

  - id: tnt-od::Charge
    aka: ["raw_bullCharge/raw_bearCharge", "ChargeLevel violation"]
    family: structural
    line_range: "530-548"
    description: "Displacement crosses an opposite-side prior charge level (TNT-zone-derived). On violation a new charge level is pushed at low[1]/high[1]."
    booleans:
      - name: raw_bullCharge
        line: 530
      - name: raw_bearCharge
        line: 530
    notes: "Effective only when not coincident with an opposite raw_bearTNT/raw_bullTNT (effectiveBullCharge gating, line 555)."

  - id: tnt-od::TNT2
    aka: ["TNT 2.0", "raw_bullTNT2/raw_bearTNT2"]
    family: structural
    line_range: "572-578"
    description: "Event-log path: ≥2 same-direction events (TNT/Napalm/effective-Charge) accumulated, gated by MIN_SIG_GAP. Internally folded into det_bullTNT/det_bearTNT."

  - id: tnt-od::Return
    aka: ["RET", "raw_retBullTNT/raw_retBearTNT", "RET TNT 2.0"]
    family: structural
    line_range: "482-501, 581-591"
    description: "Price retraces back into an active TNT zone after breakout (bull: low ≤ retLvl AND close > z.lower). Includes RET TNT 1.0 and RET TNT 2.0 (super-zone variant). Each zone fires return only once."
    consolidated_into: "det_bullRetTNT / det_bearRetTNT  line 622-623"

  - id: tnt-od::Continuous
    aka: ["CONT", "raw_contBull/raw_contBear", "sudden-change"]
    family: structural
    line_range: "593-615"
    description: "Three-clause sudden-change/proximity logic — Charge after Return within SUDDEN_PROX bars OR (TNT/TNT2 within SUDDEN_PROX of last Charge) OR Charge within SUDDEN_PROX of last TNT/TNT2."
    consolidated_into: "det_contBull / det_contBear  line 624"

  # ── DYNAMITE — owns its own dedicated displacement engine ──
  - id: tnt-od::Dynamite
    family: structural
    line_range: "875-903"
    description: "B2B extreme displacement on bar[1] AND bar[2] using DEDICATED Engine #2 (dyn_std = stdev(abs(open-close), 100), dynStdMult default 5.0), same color on both bars, FAUNA on bar[1] AND bar[2], bar[0] confirms FVG (low > high[2] / high < low[2]). v2: FVG check now mandatory."
    booleans:
      - name: det_dynamiteBull
        line: 902
      - name: det_dynamiteBear
        line: 903
    plot:
      - "p_dynBull (line 1038, plotshape line 1434, offset=-1)"
      - "p_dynBear (line 1038, plotshape line 1435, offset=-1)"
    inputs:
      - dynStdMult (default 5.0, line 168)
    plot_label: "★ DYNAMITE"

  # ── Density primitives ──
  - id: tnt-od::Density1
    family: other
    line_range: "1060-1117"
    description: "Rolling visual-bar window: ≥X events in last Y visual bars over denVisBull/denVisBear. Fires once per cluster (re-arms when count drops below X). Defaults: X=2, Y=2."
    booleans:
      - name: sig_d1b
        line: 1063
      - name: sig_d1s
        line: 1063
    plot:
      - "p_d1b / p_d1s (line 1117, plotshape lines 1457-1458, offset=-1)"
    inputs:
      - den1_X (default 2, line 207)
      - den1_Y (default 2, line 208)
    composition_note: "denVisBull/denVisBear (lines 1057-1058) is composed of det_bullTNT/det_contBull/det_rcTRBull/det_ptBull/det_prBull/det_bullNapalm/sig_rcNTBull/det_rcRNBull/det_pnBull — i.e. Density is a composite of Tier-1/Tier-2 atoms. Treated here as a NAMED primitive per task definition list."

  - id: tnt-od::Density2
    family: other
    line_range: "1085-1100, 1118"
    description: "Same engine as Density1, defaults X=3 Y=3 (stricter)."
    booleans:
      - name: sig_d2b
        line: 1063
      - name: sig_d2s
        line: 1063
    plot:
      - "p_d2b / p_d2s (line 1118, plotshape lines 1459-1460, offset=-1)"
    inputs:
      - den2_X (default 3, line 212)
      - den2_Y (default 3, line 213)

  - id: tnt-od::Density3
    family: other
    line_range: "1101-1116, 1119"
    description: "Same engine as Density1, defaults X=2 Y=6 (looser window for sparse-but-clustered events)."
    booleans:
      - name: sig_d3b
        line: 1063
      - name: sig_d3s
        line: 1063
    plot:
      - "p_d3b / p_d3s (line 1119, plotshape lines 1461-1462, offset=-1)"
    inputs:
      - den3_X (default 2, line 217)
      - den3_Y (default 6, line 218)

