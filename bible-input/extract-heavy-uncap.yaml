  # ── Calendar (1) ────────────────────────────────────────────
  - id: heavy-uncap::HOT_SPOT
    family: calendar
    plain_english: "Bar falls within at least one of 6 calendar windows known to coincide with institutional rebalancing or volatility — OpEx (10-17 Mon-Wed), Quarter-End (23-27 of Mar/Jun/Sep/Dec), Russell Rebal (Jun 19-24), Tax-Loss (Dec 21-26), January Effect (Dec 27-30), HF Redemption (May 10-13 or Nov 10-13)"
    boolean_summary: "opExWindow OR qtrEndWindow OR russellWindow OR taxLossWindow OR janEffectWindow OR hfRedemptionWindow (all evaluated on bar[1] for NRA)"
    parameters: []
    offset: -1
    plot_offset: -1
    plot_call: 'plotshape(plot_HS, title="Hot Spot", style=shape.cross, location=location.bottom, color=color.new(color.red, 0), size=size.tiny, offset=-1)'
    alertcondition_id: null
    pine_source_line_range: "L590-L601"
    lifecycle_stage: 2
    notes: "Evaluated on bar[1] (NRA — non-repainting); plotted with offset=-1 to land on the actual calendar bar. No IPSF — windows are hardcoded constants reflecting market-structure timing."

composites:
  # ── Back-to-Back composites (6) ─────────────────────────────
  - id: heavy-uncap::B2B_2X_SAAB
    tier: 1
    plain_english: "SAAB fires on bar[-1] AND on bar[0] — back-to-back same-direction RVOL 0.56× spike"
    composition:
      type: AND
      operands:
        - "heavy-pentagon::SAAB"
        - { type: SHIFT, by: -1, of: "heavy-pentagon::SAAB" }
      note: "Local: sigSAAB[1] AND sigSAAB (where sigSAAB is heavy-pentagon's SAAB recomputed locally)"
    offset: 0
    plot_offset: 0
    pine_source_line_range: "L406"
    lifecycle_stage: 5

  - id: heavy-uncap::B2B_2X_KRATOS
    tier: 1
    plain_english: "Kratos fires on bar[-1] AND on bar[0]"
    composition:
      type: AND
      operands:
