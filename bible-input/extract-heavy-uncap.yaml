  # ── RVOL Sequences (6) ──────────────────────────────────────
  - id: heavy-uncap::UU
    family: rvol_sequence
    plain_english: "Two consecutive bullish bars where each bar's bb_normalizedPrice > th_low_UU_DD (default 1.0) AND sum across the 2 bars ≥ seqTh_UU_DD (default 0.1)"
    boolean_summary: "barstate.isconfirmed AND bull_seq_len_UU == 2 AND bull_seq_sum_UU ≥ seqTh_UU_DD"
    parameters:
      - { name: th_low_UU_DD, default: 1.0, units: bb_normalizedPrice, ipsf: true }
      - { name: seqTh_UU_DD, default: 0.1, units: sum, ipsf: true }
      - { name: seq_th_high, default: 50.0, units: bb_normalizedPrice ceiling, ipsf: true, shared: true }
    offset: 0
    plot_offset: 0
    pine_source_line_range: "L389"
    lifecycle_stage: 2
    notes: "Distinct from b2b-pup's UU (which is PUP-based). This is RVOL-bar-based."

  - id: heavy-uncap::UUU
    family: rvol_sequence
    plain_english: "Three consecutive bullish bars; same gates as UU but with its own IPSF thresholds"
    boolean_summary: "barstate.isconfirmed AND bull_seq_len_UUU == 3 AND bull_seq_sum_UUU ≥ seqTh_UUU_DDD"
    parameters:
