    pine_source_line_range: "L407"
    lifecycle_stage: 5

  - id: heavy-uncap::B2B_2X_BULL_1X
    tier: 1
    plain_english: "RVOL 1x Bull fires on bar[-1] AND on bar[0]"
    composition:
      type: AND
      operands:
        - "heavy-pentagon::RVOL_1X_BULL"
        - { type: SHIFT, by: -1, of: "heavy-pentagon::RVOL_1X_BULL" }
    offset: 0
    plot_offset: 0
    pine_source_line_range: "L408"
    lifecycle_stage: 5

  - id: heavy-uncap::B2B_2X_BEAR_1X
    tier: 1
    plain_english: "RVOL 1x Bear fires on bar[-1] AND on bar[0]"
    composition:
      type: AND
      operands:
        - "heavy-pentagon::RVOL_1X_BEAR"
        - { type: SHIFT, by: -1, of: "heavy-pentagon::RVOL_1X_BEAR" }
    offset: 0
    plot_offset: 0
    pine_source_line_range: "L409"
    lifecycle_stage: 5

  - id: heavy-uncap::B2B_MID_BULL
    tier: 2
    plain_english: "Mixed back-to-back of SAAB and RVOL 1x Bull (one of them on each adjacent bar), gated by NOT (B2B_2X_SAAB OR B2B_2X_BULL_1X) so it's mutually exclusive with the pure-2x variants"
    composition:
      type: AND_GATED
      operands:
        - { type: OR, operands: [
            { type: AND, operands: [
              { type: SHIFT, by: -1, of: "heavy-pentagon::SAAB" },
              "heavy-pentagon::RVOL_1X_BULL"
            ]},
            { type: AND, operands: [
              { type: SHIFT, by: -1, of: "heavy-pentagon::RVOL_1X_BULL" },
              "heavy-pentagon::SAAB"
            ]}
          ]}
        - { type: NOT, of: "heavy-uncap::B2B_2X_SAAB" }
        - { type: NOT, of: "heavy-uncap::B2B_2X_BULL_1X" }
    offset: 0
    plot_offset: 0
    pine_source_line_range: "L411"
    lifecycle_stage: 5

  - id: heavy-uncap::B2B_MID_BEAR
    tier: 2
    plain_english: "Mixed back-to-back of Kratos and RVOL 1x Bear, gated by NOT (B2B_2X_KRATOS OR B2B_2X_BEAR_1X)"
    composition:
      type: AND_GATED
      operands:
        - { type: OR, operands: [
            { type: AND, operands: [
              { type: SHIFT, by: -1, of: "heavy-pentagon::KRATOS" },
              "heavy-pentagon::RVOL_1X_BEAR"
            ]},
            { type: AND, operands: [
              { type: SHIFT, by: -1, of: "heavy-pentagon::RVOL_1X_BEAR" },
              "heavy-pentagon::KRATOS"
            ]}
          ]}
        - { type: NOT, of: "heavy-uncap::B2B_2X_KRATOS" }
        - { type: NOT, of: "heavy-uncap::B2B_2X_BEAR_1X" }
    offset: 0
    plot_offset: 0
    pine_source_line_range: "L412"
    lifecycle_stage: 5

  # ── Consecutive Displacement (4) ────────────────────────────
  - id: heavy-uncap::CONSEC_DISP_BULL_2
    tier: 1
    plain_english: "Bullish Displacement fires on the current bar AND its bull-streak counter ≥ 2"
    composition:
      type: AND
      operands:
        - "hvd-pbj-ppd::DISPLACEMENT_BULL"
