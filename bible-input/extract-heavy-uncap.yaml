        - "ultra-combo::TA_BEAR"
        - "ultra-combo::GG_BEAR"
        - "ultra-combo::TR_BEAR"
        - "ultra-combo::ES_BEAR"
        - "ultra-combo::GDR_BEAR"
    offset: 0
    plot_offset: 0
    pine_source_line_range: "L505-L550"
    lifecycle_stage: 5

