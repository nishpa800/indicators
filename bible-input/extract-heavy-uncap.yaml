    lifecycle_stage: 5

  # ── FAUNA label-based (2) ───────────────────────────────────
  - id: heavy-uncap::FAUNA_BULL
    tier: 1
    plain_english: "Hierarchical OR over FAUNA components MB/RE/TA + reversal-component GG/TR/ES/GDR. Resolved to a label-text string by priority: 4-component combo > 3-component > 2-component > singletons"
    composition:
      type: HIERARCHICAL_OR
      operands:
        - "ultra-combo::MB_BULL"
        - "ultra-combo::RE_BULL"
        - "ultra-combo::TA_BULL"
        - "ultra-combo::GG_BULL"
        - "ultra-combo::TR_BULL"
        - "ultra-combo::ES_BULL"
        - "ultra-combo::GDR_BULL"
      note: "Local re-implementation. Different label-text resolution from ultra-combo (which uses pure boolean composition). Stage 7 byte-diff vs ultra-combo to verify component-level parity."
    offset: 0
    plot_offset: 0
    pine_source_line_range: "L457-L502"
    lifecycle_stage: 5

  - id: heavy-uncap::FAUNA_BEAR
