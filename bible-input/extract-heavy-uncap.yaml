indicator:
  id: heavy-uncap
  file: heavy-uncap/versions/HEAVY_UNCAP_v1.pine
  branch: claude/organize-indicators-hierarchy-8JDw1
  pine_version: 5
  line_count: 595
  overlay: true
  one_line_purpose: "Comprehensive RVOL toolkit — bundles heavy-pentagon RVOL roots locally, adds 7 Hybrid Momentum tiers + 6 RVOL sequences + 6 B2B + 4 Consec Disp + FAUNA label-based composites + HV ladder + Hot Spot calendar"
  is_canonical_for: ["LONG_1/2/3/4/5", "SHORT_1/2", "UU/UUU/UUUU/DD/DDD/DDDD", "HOT_SPOT", "B2B_2X_*", "B2B_MID_*", "CONSEC_DISP_*"]
  notes: |
    The unique ingredient is the "Hybrid RVOL" — bar-RVOL (Reg @ Time,
    non-cumulative) × cumulative-session-RVOL × body-ratio. This is NOT
    the same as WTC/Hiroshima's RVOL @ Reg time. The 5 Long tiers + 2 Short
    tiers let Anish tune 7 independent momentum detectors against different
    conviction levels simultaneously.

    Locally re-implements every heavy-pentagon RVOL root (SAAB, Kratos,
    Bull/Bear RVOL 1x, Grand Slam, MOAB, WTC, Hiroshima, Nagasaki) and
    hvd-pbj-ppd's Displacement. Threshold ladders verified byte-identical
    to heavy-pentagon — no drift today, but watch for IPSF-asymmetry
    going forward.

local_reimplementations:
  - heavy-pentagon::SAAB
  - heavy-pentagon::KRATOS
  - heavy-pentagon::RVOL_1X_BULL
  - heavy-pentagon::RVOL_1X_BEAR
  - heavy-pentagon::GRAND_SLAM
  - heavy-pentagon::MOAB
  - heavy-pentagon::PENTAGON     # implicit (same RVOL@Reg pipeline)
  - heavy-pentagon::WTC
  - heavy-pentagon::HIROSHIMA
  - heavy-pentagon::NAGASAKI
  - hvd-pbj-ppd::DISPLACEMENT_BULL
  - hvd-pbj-ppd::DISPLACEMENT_BEAR
  - hvd-pbj-ppd::HV ladder tiers (75/150/250/500/1000)

internal_helpers:
  - name: f_rvol_1x_threshold / f_saab_kratos_threshold / f_gs_moab_threshold / f_wtc_threshold / f_hiroshima_threshold
    purpose: Timeframe-keyed threshold ladders (10s → 7200s+ buckets)
    pine_source_line_range: "L113-L165"
    notes: "Verified byte-identical to heavy-pentagon. Internal."
  - name: bb_normalizedPrice / bb_normalizedVolume / bb_baseBullish / bb_baseBearish / bb_smaDiff
    purpose: Heavy-pentagon RVOL pipeline (price-spike-minus-volume-spike basis)
    pine_source_line_range: "L172-L190"
    notes: "Internal; same as heavy-pentagon."
  - name: hybRegRatio / hybCumRatio / hybBodyRat / hybConvict<n> / hybMom<n>
    purpose: Hybrid Momentum pipeline (bar-RVOL × cumulative-RVOL × body-ratio)
    pine_source_line_range: "L215-L260"
    notes: "Pre-configured combo. Distinct from heavy-pentagon's RVOL@Reg pipeline. Feeds the 7 LONG/SHORT roots."
  - name: tv_ta.relativeVolume()
    purpose: TradingView library RVOL function (anchor TF + Cumulative/Regular mode + realtime adjustment)
    notes: "Called twice: once for non-cumulative (hybRegCur), once for cumulative (hybCumCur). Internal."
  - name: seq_inRange_pair / bull_seq_len_<UU/UUU/UUUU> / bear_seq_len_<DD/DDD/DDDD>
    purpose: Per-pair sequence-tracking var-state machines
    pine_source_line_range: "L296-L390"
    notes: "Var-state counters reset to 0 on any non-qualifying bar. Internal."
  - name: disp_isPrevBarDisplaced / disp_bullStreak / disp_bearStreak
    purpose: Displacement detection + streak counter for Consec Disp composites
    pine_source_line_range: "L515-L555"
    notes: "Same as hvd-pbj-ppd Engine 3 with min/max σ-mult bounds (3.0 / 7.0)."
  - name: FAUNA pipeline (fn_MB / fn_RE / fn_TA / fn_GG / fn_TR / fn_ES / fn_GDR bull/bear)
    purpose: Same family primitives as ultra-combo, computed locally
    pine_source_line_range: "L405-L505"
    notes: "Parameter defaults hardcoded (not IPSF here). Stage 7 byte-diff vs ultra-combo locks (which is IPSF). Internal — the named primitives MB/RE/TA/GG/TR/ES/GDR are ROOTS canonically in ultra-combo, not duplicated here."

roots:
  # ── Hybrid Momentum (7) ─────────────────────────────────────
  - id: heavy-uncap::LONG_1
    family: rvol_hybrid
    plain_english: "Bar-RVOL > reg_floor (default 5.0) AND cumulative session-RVOL > cum_floor (default 3.0) AND bar body-ratio ≥ body_ratio_floor (default 0.65) AND bar is bullish"
    boolean_summary: "barstate.isconfirmed AND hybRegRatio > hyb_addReg1 AND hybCumRatio > hyb_addCum1 AND (close > open) AND hybBodyRat ≥ hyb_bodyRat1"
    parameters:
      - { name: hyb_addReg1, default: 5.0, units: ratio, ipsf: true }
      - { name: hyb_addCum1, default: 3.0, units: ratio, ipsf: true }
      - { name: hyb_bodyRat1, default: 0.65, units: ratio, ipsf: true }
    offset: 0
    plot_offset: 0
    plot_call: 'plotshape(show_Long1 and sigAddLong1, title="LONG 1", ...)'
    alertcondition_id: null
    pine_source_line_range: "L226-L228"
    lifecycle_stage: 2
    notes: "Bar AND session both hot. Trend continuation pattern."

  - id: heavy-uncap::SHORT_1
    family: rvol_hybrid
    plain_english: "Mirror of LONG_1 for bearish bars"
    boolean_summary: "barstate.isconfirmed AND hybRegRatio > hyb_addReg1 AND hybCumRatio > hyb_addCum1 AND (close < open) AND hybBodyRat ≥ hyb_bodyRat1"
    parameters:
      - { name: hyb_addReg1, default: 5.0, units: ratio, ipsf: true }
      - { name: hyb_addCum1, default: 3.0, units: ratio, ipsf: true }
      - { name: hyb_bodyRat1, default: 0.65, units: ratio, ipsf: true }
    offset: 0
