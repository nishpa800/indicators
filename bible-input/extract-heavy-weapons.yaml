    plain_english: "Bearish bar with normalized price spike at or above the MOAB threshold (top tier of P1). LIFTED VERBATIM FROM heavy-pentagon."
    boolean_summary: "conf AND bb_baseBearish AND bb_normalizedPrice >= th_gs_moab"
    parameters:
      - name: bb_avgLength
        default: 30
        units: bars
      - name: bb_smaLength
