    pipeline: "P1 Standard RVOL"
    notes: "Top-tier bearish RVOL. Lifted verbatim from heavy-pentagon."
    cross_indicator_ref: "heavy-pentagon::MOAB"

  - id: heavy-weapons-8fvg-matrix::PENTAGON
    family: rvol
    plain_english: "Time-regularized relative volume ratio in the Pentagon band (1× to 2× the RVOL-1x threshold). LIFTED VERBATIM FROM heavy-pentagon."
    boolean_summary: "conf AND relVolRatio in [th_1x, th_wtc]"
    parameters:
      - name: reg_anchorTimeframe
        default: ""
        units: timeframe
      - name: reg_length
        default: 30
        units: bars
      - name: reg_calculationMode
        default: "Cumulative"
        units: ratio
      - name: reg_adjustRealtime
        default: true
        units: boolean
    offset: 0
    plot_call: 'plotshape(fire_Pentagon, title="Pentagon", style=shape.diamond, location=location.top, size=size.small, color=color.teal, text="PENT")'
    alertcondition_id: "Pentagon"
    pine_source_line_range: "L158, L431, L466"
    pipeline: "P2 Reg@Time RVOL"
    notes: "Lowest-tier time-regularized volume (neutral, no direction). Lifted verbatim from heavy-pentagon."
    cross_indicator_ref: "heavy-pentagon::PENTAGON"

  - id: heavy-weapons-8fvg-matrix::WTC
    family: rvol
    plain_english: "Time-regularized relative volume ratio in the WTC band (2× to Hiroshima threshold). LIFTED VERBATIM FROM heavy-pentagon."
    boolean_summary: "conf AND relVolRatio in (th_wtc, th_hiroshima]"
    parameters:
      - name: reg_anchorTimeframe
        default: ""
        units: timeframe
      - name: reg_length
        default: 30
        units: bars
      - name: reg_calculationMode
        default: "Cumulative"
        units: ratio
      - name: reg_adjustRealtime
        default: true
        units: boolean
    offset: 0
    plot_call: 'plotshape(fire_WTC, title="WTC", style=shape.diamond, location=location.top, size=size.normal, color=color.yellow, text="WTC")'
    alertcondition_id: "WTC"
    pine_source_line_range: "L159, L432, L467"
    pipeline: "P2 Reg@Time RVOL"
    notes: "Mid-tier time-regularized volume. Lifted verbatim from heavy-pentagon."
    cross_indicator_ref: "heavy-pentagon::WTC"

  - id: heavy-weapons-8fvg-matrix::HIROSHIMA
    family: rvol
    plain_english: "Time-regularized relative volume ratio exceeds the Hiroshima threshold (top tier of P2). LIFTED VERBATIM FROM heavy-pentagon."
    boolean_summary: "conf AND relVolRatio > th_hiroshima"
    parameters:
      - name: reg_anchorTimeframe
        default: ""
        units: timeframe
      - name: reg_length
        default: 30
        units: bars
      - name: reg_calculationMode
        default: "Cumulative"
        units: ratio
      - name: reg_adjustRealtime
        default: true
        units: boolean
    offset: 0
    plot_call: 'plotshape(fire_Hiroshima, title="Hiroshima", style=shape.diamond, location=location.top, size=size.normal, color=color.white, text="H")'
    alertcondition_id: "Hiroshima"
    pine_source_line_range: "L160, L433, L468"
    pipeline: "P2 Reg@Time RVOL"
    notes: "Top-tier time-regularized volume. Lifted verbatim from heavy-pentagon."
    cross_indicator_ref: "heavy-pentagon::HIROSHIMA"

  - id: heavy-weapons-8fvg-matrix::NAGASAKI
    family: rvol
    plain_english: "All-time high volume bar — current bar volume exceeds the running maximum since bar 0. LIFTED VERBATIM FROM heavy-pentagon."
    boolean_summary: "conf AND volume > running max volume"
    parameters: []
    offset: 0
    plot_call: 'plotshape(fire_Nagasaki, title="Nagasaki (HEV)", style=shape.flag, location=location.top, size=size.normal, color=color.purple, text="N")'
    alertcondition_id: "Nagasaki"
    pine_source_line_range: "L162-L170, L434, L469"
    pipeline: "P3 All-Time High Volume"
    notes: "HEV = Highest Ever Volume. Lifted verbatim from heavy-pentagon. Tracked via persistent var maxVol."
    cross_indicator_ref: "heavy-pentagon::NAGASAKI"

  # --- GZI/HV FVG ROOTS (NEW to this indicator) ---
  - id: heavy-weapons-8fvg-matrix::BULL_GZI
    family: fvg
    aka: ["bullGZI"]
    plain_english: "Bullish FVG (low > high[2], close[1] > high[2], vertical gap > threshold) overlaps with a prior bullish FVG stored in the fvgs array within gziDist bars (7 bars default). Also fires if both current and prior FVGs are HV (all-time high volume). NEW to this indicator."
    boolean_summary: "conf AND bFVG AND overlap detected with prior bull FVG within 7 bars OR (both HV)"
    parameters:
      - name: gziDist
        default: 7
        units: bars
      - name: threshPct
        default: 2
        units: "% of high[2]"
      - name: auto
        default: true
        units: boolean
    offset: 0
    plot_call: "(used by comboSet1_Bull and comboSet2_Bull; no standalone plot)"
    alertcondition_id: null
    pine_source_line_range: "L177-L205"
    pipeline: "GZI/HV Overlap Detection"
    notes: "Bullish FVG entry: bFVG fires when low > high[2] and close[1] > high[2]. Overlap detection: stored FVGs checked for e.bull && bar_index - e.idx <= gziDist. HV flag set when v1_fvg is 5000/252/63-bar high. NEW to this indicator."

  - id: heavy-weapons-8fvg-matrix::BEAR_GZI
    family: fvg
    aka: ["bearGZI"]
    plain_english: "Bearish FVG (high < low[2], close[1] < low[2], vertical gap > threshold) overlaps with a prior bearish FVG stored in the fvgs array within gziDist bars. Also fires if both are HV. NEW to this indicator."
    boolean_summary: "conf AND sFVG AND overlap detected with prior bear FVG within 7 bars OR (both HV)"
    parameters:
      - name: gziDist
        default: 7
        units: bars
      - name: threshPct
        default: 2
        units: "% of high"
      - name: auto
        default: true
        units: boolean
    offset: 0
    plot_call: "(used by comboSet1_Bear and comboSet2_Bear; no standalone plot)"
    alertcondition_id: null
    pine_source_line_range: "L207-L220"
    pipeline: "GZI/HV Overlap Detection"
    notes: "Bearish FVG entry. Mirror of BULL_GZI. NEW to this indicator."

  - id: heavy-weapons-8fvg-matrix::BULL_HV
    family: fvg
    aka: ["bullHV"]
    plain_english: "Bullish FVG where prior bar volume is an all-time high (5000-bar / 252-bar / 63-bar). NEW to this indicator."
    boolean_summary: "conf AND bFVG AND isHV_FVG (v1_fvg is a 5000/252/63-bar high)"
    parameters: []
    offset: 0
    plot_call: "(used by comboSet1_Bull and comboSet2_Bull; no standalone plot)"
    alertcondition_id: null
    pine_source_line_range: "L178, L194-L195"
    pipeline: "GZI/HV Overlap Detection"
    notes: "HV flag for bullish FVG. NEW to this indicator."

  - id: heavy-weapons-8fvg-matrix::BEAR_HV
    family: fvg
    aka: ["bearHV"]
    plain_english: "Bearish FVG where prior bar volume is an all-time high (5000-bar / 252-bar / 63-bar). NEW to this indicator."
    boolean_summary: "conf AND sFVG AND isHV_FVG (v1_fvg is a 5000/252/63-bar high)"
    parameters: []
    offset: 0
    plot_call: "(used by comboSet1_Bear and comboSet2_Bear; no standalone plot)"
    alertcondition_id: null
    pine_source_line_range: "L178, L209-L210"
    pipeline: "GZI/HV Overlap Detection"
    notes: "HV flag for bearish FVG. Mirror of BULL_HV. NEW to this indicator."

  # --- FAUNA / MATRIX ROOTS (NEW to this indicator) ---
  - id: heavy-weapons-8fvg-matrix::FAUNA_BULL
    family: fauna
    aka: ["is_fauna_bull"]
    plain_english: "Bullish fauna pattern: (MB_bull OR RE_bull OR TA_bull) AND NOT excluded, where exclusions are TR_bull (weak prior bear after strong fauna), ES_bull (strong prior bear after strong fauna), or GDR_bull (gap-down recovery). NEW to this indicator."
    boolean_summary: "(MB_bull OR RE_bull OR TA_bull) AND NOT (TR_bull OR ES_bull OR GDR_bull)"
    parameters:
      - name: b_alpha_MB
        default: 1.6
        units: ATR multiplier
      - name: b_beta_MB
        default: 0.70
        units: body ratio
      - name: b_delta_MB
        default: 1.8
        units: volume multiplier
      - name: b_gamma_RE
        default: 2.2
        units: ATR multiplier
      - name: b_epsilon_RE
        default: 0.15
        units: overhead ratio
      - name: b_delta_RE
        default: 1.8
        units: volume multiplier
      - name: b_theta_TA
        default: 1.6
        units: delta multiplier
      - name: b_delta_TA
        default: 1.8
        units: volume multiplier
      - name: b_trend_len
        default: 50
        units: bars
      - name: b_delta_len
        default: 10
        units: bars
      - name: b_zeta_GG
        default: 0.9
        units: ATR multiplier
      - name: b_delta_GG
        default: 1.8
        units: volume multiplier
      - name: b_alpha_SB
        default: 1.5
        units: body multiplier
      - name: b_delta_SB
        default: 1.5
        units: volume multiplier
      - name: b_weak_rat
        default: 0.2
        units: body ratio
      - name: b_body_len
        default: 20
        units: bars
      - name: b_range_len
        default: 20
        units: bars
    offset: 0
    plot_call: "(used by neo_bull and trinity_bull; no standalone plot)"
    alertcondition_id: null
    pine_source_line_range: "L264-L291"
    pipeline: "Fauna Pattern Recognition"
    notes: "Fauna = fauna_bull is true; fauna_bear is false. MB (Movement Break) > 1.6 ATR + body ratio > 0.70 + volume > 1.8 AvgVol. RE (Range Extension) > 2.2 ATR + tight close. TA (Trend Accel) trend up + delta up + bullish body. Exclusions prevent false signals on weak bounces and gap fills. NEW to this indicator."

  - id: heavy-weapons-8fvg-matrix::FAUNA_BEAR
    family: fauna
    aka: ["is_fauna_bear"]
    plain_english: "Bearish fauna pattern (mirror of FAUNA_BULL). NEW to this indicator."
    boolean_summary: "(MB_bear OR RE_bear OR TA_bear) AND NOT (TR_bear OR ES_bear OR GDR_bear)"
    parameters:
      - name: s_alpha_MB
        default: 1.6
        units: ATR multiplier
      - name: s_beta_MB
        default: 0.70
        units: body ratio
      - name: s_delta_MB
        default: 1.8
        units: volume multiplier
      - name: s_gamma_RE
        default: 2.2
        units: ATR multiplier
      - name: s_epsilon_RE
        default: 0.15
        units: overhead ratio
      - name: s_delta_RE
        default: 1.8
        units: volume multiplier
      - name: s_theta_TA
        default: 1.6
        units: delta multiplier
      - name: s_delta_TA
        default: 1.8
        units: volume multiplier
      - name: s_trend_len
        default: 50
        units: bars
      - name: s_delta_len
        default: 10
        units: bars
      - name: s_zeta_GG
        default: 0.9
        units: ATR multiplier
      - name: s_delta_GG
        default: 1.8
        units: volume multiplier
      - name: s_alpha_SB
        default: 1.5
        units: body multiplier
      - name: s_delta_SB
        default: 1.5
        units: volume multiplier
      - name: s_weak_rat
        default: 0.2
        units: body ratio
      - name: s_body_len
        default: 20
        units: bars
      - name: s_range_len
        default: 20
        units: bars
    offset: 0
    plot_call: "(used by neo_bear and trinity_bear; no standalone plot)"
    alertcondition_id: null
    pine_source_line_range: "L293-L315"
    pipeline: "Fauna Pattern Recognition"
    notes: "Bearish fauna (mirror). NEW to this indicator."

  - id: heavy-weapons-8fvg-matrix::NEO_BULL
    family: matrix
    aka: ["neo_bull"]
    plain_english: "Matrix number (volume == ta.highest(volume, 67)) AND fauna bull (is_fauna_bull == true). Conf-gated. NEW to this indicator."
    boolean_summary: "conf AND is_matrix_number AND is_fauna_bull"
