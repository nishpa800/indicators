    tier: 2
    aka: ["comboSet1_Bull", "F-S1 Bull", "FVG + Std RVOL Bull"]
    plain_english: "Bullish GZI/HV FVG combo: bar[1] has valid body (>= 0.85 candle range) AND (bullGZI OR bullHV) AND (SAAB[1] OR Bull RVOL 1x[1] OR Grand Slam[1]). Fires on bar[0]. Offset=-1 since bar[1] is the FVG candle."
