    cross_indicator_ref: "heavy-pentagon::RVOL_1X_BULL"

  - id: heavy-weapons-8fvg-matrix::RVOL_1X_BEAR
    family: rvol
    plain_english: "Bearish bar with normalized price spike in the RVOL-1x band. LIFTED VERBATIM FROM heavy-pentagon."
