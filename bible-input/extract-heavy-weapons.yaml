uncertain_or_questions:
  - "PARALLEL BRANCH status: This indicator lifts the 10 RVOL roots from heavy-pentagon verbatim (P1/P2/P3 pipelines, same thresholds, same functions, same P1/P2/P3 tier logic). However, it drops all 15 Heavy Combo composites (Heavy Yin-Yang, Heavy Nagasaki, etc.) that are the signature of heavy-pentagon. Instead, it introduces GZI/HV FVG detection, Fauna/Matrix pattern recognition, and Hybrid Momentum alignment, building 4 Matrix Combos + 2 FVG Combos. This is a PARALLEL BRANCH (different composite layer), not a successor to heavy-pentagon."
  - "Title ambiguity: Indicator title is 'Heavy Weapons NRA + GZI/FVG + Matrix Combos 2 bodies not 1 NRAFR' (line 16). The '2 bodies not 1' clause is unclear. The code does not implement a '2-body' rule; it implements standard RVOL + GZI/HV + Fauna + Hybrid logic. Documented as-is."
  - "FVG fires on bar[1] displacement: comboSet1/2 fire on bar[0] but have offset=-1, marking the bar[1] FVG candle per Verification Protocol v3.2 Part 5 Rule 2. Matrix combos (comboSet3/4) fire on bar[0] with offset=0 (no displacement candle). Timing documented."
  - "Fauna + Matrix alignment: neo_bull_aligned / neo_bear_aligned / trinity_bull_aligned / trinity_bear_aligned are computed on every bar but only used by COMBO_SET_3/4. They are not standalone roots (no plotshape/alertcondition directly on them). Classified as roots since they are named, conf-gated intermediate booleans; caller may prefer internal_helper classification."
  - "Pentagon optionality: Both FVG and Matrix combos have inc_pentagon_FVG / inc_pentagon_MAT checkboxes (lines 64, 77) that gate whether Pentagon is included in volRegTimeActiveBull/Bear gates (lines 368-369, 385-386). If disabled, only WTC/Hiroshima/Nagasaki count toward P2 requirement. Documented."
  - "Conf-gating parity: All 10 RVOL roots lifted from heavy-pentagon are conf-gated (line 116: conf = barstate.isconfirmed). All GZI/HV/Fauna/Matrix/Momentum roots are conf-gated. FVG combo signals (comboSet1/2) have explicit conf gate (line 365-372). Matrix combo signals (comboSet3/4) are implicitly conf-gated via matrix_any_bull/bear (which require neo/trinity, which require conf). All fire_* booleans gate on show_* input booleans AND the signal boolean, ensuring 1:1 parity between plot and alert."
  - "Array mutation safety: Lines 191-232 show the GZI overlap detection logic gated by conf block (line 191: if conf). Without this gate, array unshift/remove operations would execute on every intrabar tick, duplicating fvgs entries and causing permanent corruption. This is the core NRA fix documented in line 6."
  - "Fauna exclusion filters: is_fauna_bull/bear have hard and soft exclusion filters (TR_bull/TR_bear for weak prior bear/bull bounces; ES_bull/ES_bear for strong prior bar engulfment; GDR_bull/GDR_bear for gap-down/gap-up recovery). These prevent false fauna signals in common market noise patterns. No parameters for exclusion tuning; baked in."
  - "SAAB/Kratos/RVOL1x never used in composites: Unlike heavy-pentagon, where SAAB/Kratos are plotting roots, here they appear only in COMBO_SET_1/3 operands. There are no standalone plotshapes for SAAB or Kratos alone; only comboSet1_Bull and comboSet3_Bull plots. SAAB/Kratos are roots but never fire independently unless show_SAAB/show_Kratos are true (lines 36-37), in which case fire_SAAB / fire_Kratos (lines 394-395) emit. Documented as roots (they are named, conf-gated, plotted) but their primary role is as composite operands."
  - "Hybrid Momentum floor interpretation: sigAddLong1/sigAddShort1 (lines 330-331) require hybRegRatio > 5.0 AND hybCumRatio > 3.0, both floats. These are 'floors' (minimums) for momentum-aligned signals, not ratio multipliers. Named sigAdd* to indicate 'additional' momentum condition. No operand merging with Fauna (neo_bull_aligned = neo_bull AND sigAddLong1, line 346; they are independent ANDs, not exclusive)."
