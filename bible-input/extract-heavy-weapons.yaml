indicator:
  id: heavy-weapons-8fvg-matrix
  file: heavy-weapons/versions/HEAVY_WEAPONS_8FVG_MATRIX_COMBOS_NO_PENTAGON_v1.pine
  branch: main
  pine_version: 5
  line_count: 489
  overlay: true
  one_line_purpose: "Lifts RVOL engine (10 roots) from heavy-pentagon; adds GZI/HV FVG detection, Fauna/Matrix pattern recognition, and Hybrid Momentum; combines into 4 Matrix Combos + 2 FVG Combos (4 directional variants each)"
  architecture: "NRA (Non-Repainting): GZI/HV mutations gated by barstate.isconfirmed; FVG combo signals explicitly conf-gated; all fire_* booleans 1:1 with plots/alerts"
  parent_indicator: "heavy-pentagon (RVOL roots only)"
  relationship_to_parent: "Parallel branch. Heavy-pentagon owns 10 RVOL roots + 15 Heavy Combos. This indicator lifts the 10 RVOL roots verbatim but drops all 15 Heavy Combos. Substitutes its own 4 Matrix Combos + 2 FVG Combos built from GZI/HV + Fauna + Hybrid Momentum."
  fixes_applied:
    - "GZI/HV FVG array mutations (unshift/remove) gated by barstate.isconfirmed to prevent intrabar state corruption"
    - "bullGZI/bearGZI/bullHV/bearHV only set inside conf block; FVG combo signals no longer repaint"
    - "FVG combo signals (comboSet1/2) explicitly conf-gated"
    - "All plots and alerts use identical fire_* booleans for 1:1 parity"
    - "Added missing alertconditions for SAAB, Kratos, Bull/Bear RVOL 1x, Long 1/2, Short 1/2"

internal_helpers:
  - name: f_rvol_1x_threshold
    pine_source_line_range: "L118-L121"
    notes: "TF-keyed σ-multiplier table for RVOL 1x threshold (lifted verbatim from heavy-pentagon)"
  - name: "th_1x, th_saab_kratos, th_wtc"
    pine_source_line_range: "L123-L125"
    notes: "RVOL thresholds: th_1x = f_rvol_1x_threshold; th_saab_kratos = th_1x × 0.56; th_wtc = th_1x × 2.0 (verbatim from heavy-pentagon)"
  - name: f_gs_moab_threshold
    pine_source_line_range: "L127-L130"
    notes: "TF-keyed table for Grand Slam / MOAB threshold (verbatim from heavy-pentagon)"
  - name: "th_gs_moab, th_hiroshima"
    pine_source_line_range: "L132-L133"
    notes: "Grand Slam/MOAB and Hiroshima thresholds (verbatim from heavy-pentagon)"
  - name: "P1 intermediates (bb_spike, bb_normalizedPrice, bb_normalizedVolume, bb_diff, bb_positiveDiff, bb_smaDiff, bb_baseBullish, bb_baseBearish)"
    pine_source_line_range: "L135-L145"
    notes: "Pipeline 1 derived series (verbatim from heavy-pentagon)"
  - name: bb_inRange
    pine_source_line_range: "L146"
    notes: "v >= lowTh and v < highTh — half-open band check (verbatim from heavy-pentagon)"
  - name: "P2 relVolRatio + Penn/WTC/Hiroshima booleans (sigPentagon, sigWTC, sigHiroshima)"
    pine_source_line_range: "L155-L160"
    notes: "Pipeline 2 reg@time RVOL ratio + tier classifications (verbatim from heavy-pentagon)"
  - name: "P3 Nagasaki running-max engine (maxVol, isNagasaki, sigNagasaki)"
    pine_source_line_range: "L162-L170"
    notes: "Pipeline 3 ATH-volume detection (verbatim from heavy-pentagon)"
  - name: "GZI/HV FVG detection (isHV_FVG, bFVG, sFVG, v1_fvg)"
    pine_source_line_range: "L177-L183"
    notes: "HV detection: 5000-bar / 252-bar / 63-bar highs. FVG detection: threshold via auto or user-set threshPct. NEW to this indicator."
  - name: "FVG array + GZI overlap engine (fvgs, bullGZI, bearGZI, bullHV, bearHV, lastT)"
    pine_source_line_range: "L184-L232"
    notes: "GZI overlap detection (gziDist <= 7 bars by default); HV flag set when isHV_FVG. Conf-gated to prevent intrabar corruption. NEW to this indicator."
  - name: "FAUNA BULLISH LOGIC (MB_bull, RE_bull, TA_bull, GG_bull, TR_bull, ES_bull, GDR_bull, is_fauna_bull)"
    pine_source_line_range: "L259-L291"
    notes: "Fauna pattern recognition: Movement Break (MB), Range Extension (RE), Trend Acceleration (TA), Gap Gorge (GG), plus exclusion filters. NEW to this indicator."
  - name: "FAUNA BEARISH LOGIC (MB_bear, RE_bear, TA_bear, GG_bear, TR_bear, ES_bear, GDR_bear, is_fauna_bear)"
    pine_source_line_range: "L293-L315"
    notes: "Fauna pattern recognition (bearish mirrors). NEW to this indicator."
  - name: "MATRIX BASE (neo_bull, neo_bear, trinity_bull, trinity_bear)"
    pine_source_line_range: "L341-L344"
    notes: "Matrix base: neo = matrix number + is_fauna; trinity = matrix number + not fauna + body direction. NEW to this indicator."
  - name: "is_matrix_number"
    pine_source_line_range: "L262"
    notes: "volume == ta.highest(volume, matrix_len) — matrix lookback (default 67 bars)"
  - name: "HYBRID MOMENTUM ALIGNMENT (hybRegRatio, hybCumRatio, hybBodyRat, sigAddLong1/2, sigAddShort1/2)"
    pine_source_line_range: "L317-L338"
    notes: "Momentum 1 & 2: Reg@Time ratio + Cum ratio thresholds + body ratio gate, conf-gated. NEW to this indicator."
  - name: "ALIGNED SIGNALS (neo_bull_aligned, neo_bear_aligned, trinity_bull_aligned, trinity_bear_aligned)"
    pine_source_line_range: "L346-L349"
    notes: "Matrix base signals aligned with Hybrid Momentum (Long1/2 for bull, Short1/2 for bear). NEW to this indicator."
  - name: "FVG BODY EVALUATION (validBody_FVG)"
    pine_source_line_range: "L356-L359"
    notes: "Bar[1] body size as % of candle range >= comboBodyPct_FVG (default 0.85)"
  - name: "MATRIX BODY EVALUATION (validBody_MAT)"
    pine_source_line_range: "L375"
    notes: "Current bar body size as % of candle range >= comboBodyPct_MAT (default 0.85)"
  - name: "volRegTimeActiveBull_FVG / volRegTimeActiveBear_FVG"
    pine_source_line_range: "L368-L369"
    notes: "P2 gate for FVG Combos: (Pentagon if enabled) OR WTC OR Hiroshima OR Nagasaki"
  - name: "volRegTimeActiveBull_MAT / volRegTimeActiveBear_MAT"
    pine_source_line_range: "L385-L386"
    notes: "P2 gate for Matrix Combos: (Pentagon if enabled) OR WTC OR Hiroshima OR Nagasaki"
  - name: "matrix_any_bull, matrix_any_bear"
    pine_source_line_range: "L377-L378"
    notes: "OR-gate: neo_bull OR trinity_bull OR neo_bull_aligned OR trinity_bull_aligned (and bearish mirror)"

roots:
  # --- RVOL ROOTS (lifted verbatim from heavy-pentagon) ---
  - id: heavy-weapons-8fvg-matrix::SAAB
    family: rvol
    plain_english: "Bullish bar with normalized price spike in the SAAB/Kratos band (0.56× to 1× the RVOL-1x threshold). LIFTED VERBATIM FROM heavy-pentagon."
    boolean_summary: "conf AND bb_baseBullish AND bb_normalizedPrice in [th_saab_kratos, th_1x)"
    parameters:
      - name: bb_avgLength
        default: 30
        units: bars
      - name: bb_smaLength
        default: 20
        units: bars
    offset: 0
    plot_call: 'plotshape(fire_SAAB, title="SAAB", style=shape.square, location=location.belowbar, size=size.tiny, color=color.lime, text="SAAB")'
    alertcondition_id: "SAAB"
    pine_source_line_range: "L148, L424, L458"
    pipeline: "P1 Standard RVOL"
    notes: "Lower-band bullish RVOL. Lifted verbatim from heavy-pentagon (same bb_baseBullish, same th_saab_kratos formula)."
    cross_indicator_ref: "heavy-pentagon::SAAB"

  - id: heavy-weapons-8fvg-matrix::KRATOS
