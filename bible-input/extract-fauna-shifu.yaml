cross_indicator_dependencies:
  - target: b2b-pup
    relationship: "root-level duplication"
    notes: "FAUNA_BULL/BEAR, PUP/PPD, RVOL tiers (SAAB/Kratos/1x/GrandSlam/MOAB), GZ1_FVG/HV, PBJ engine all defined identically in both files. fauna-shifu extends b2b-pup with SHIFU layer."

  - target: anish-50-1st-combo
    relationship: "methodology alignment"
    notes: "Both use 'first bar only' gating concept. fauna-shifu generalizes to 'Jumbo CIA' master gate; anish-50-1st uses explicit 1st-combo. AnishBull/AnishBear EMA stacks defined in both."

  - target: hvd-pbj-ppd
    relationship: "probable overlap"
    notes: "PUP/PPD, Whale, PBJ engine likely overlap; not yet confirmed. PB vs PBJ distinction controlled via enable_PB toggle."

  - target: heavy-pentagon
    relationship: "RVOL ladder potential overlap"
    notes: "SAAB/Kratos/1x/GrandSlam/MOAB/Pentagon/WTC/Hiroshima naming convention similar; heavy-pentagon may be the canonical RVOL source."

uncertain_or_questions:
  - "SHIFU integration: What is SHIFU's canonical source? This file ports KC/pivot/Q3 but no SHIFU indicator file exists in fauna-shifu folder — likely ported from shifu-standalone or Anish's private library."
  - "KC Master Filter: Is Q3+KC+Candle the correct filter, or is it an experiment? Per line 174–176, both 'Q3+KC+Candle' and 'KC+Candle' modes are selectable."
  - "Jumbo CIA first-bar gating: Why are SAAB²/KRATOS²/Katana/Double Disp/Foxtrot exempt from first-bar gate? Is this intentional (density signals should fire multi-bar) or a bug?"
  - "Offset alignment (moff): When i_req_fvg=true, all signals align to bar[−1] for FVG completion. Does this cause visible lag on multi-bar composites?"
  - "Shifu vs FAUNA precedence: If both Dante's Peak and FAUNA_BULL fire same bar, which takes priority in alerts? Master Filter gates all equally."
  - "Yin-Yang pivots vs Swingin S/R: Are yy_srs and sh_srLevels (Ping Pong) intended to work together, or independently?"
  - "LONG 1 / Momentum 1 scope: Used only in FAUNA+ displacement density calcs (line 1223, 1232, 1364). Not a standalone plot. Is it a root or helper?"
  - "Whale redefinition (line 1048–1051): Now requires PBJ (anyBullPBJ). Prior version may have allowed PB. Is this change documented?"
  - "Gripen Pent vs Gripen: The file mentions 'Gripen PB' toggle (line 11) but no explicit sigGripenPB signal found. Is Gripen strictly the swing-low variant?"
  - "Combo density philosophy: Alpha–Echo use N-hits-in-M-bars with chain state. Foxtrot uses 4-consecutive. Golf uses 2-consecutive×2. Why different window patterns?"
  - "Session memory: Katana stores yesterday's FAUNA/DISP/HV/GZI/Breakout flags on is_new_sess. If bar[1] aligns to prior session, are flags from 2+ days ago stale?"

notes:
  - "File size: 2338 lines — largest in fauna indicator family."
  - "Gating philosophy: 1st PUP + Jumbo CIA exemptions for multi-bar signals + KC+Candle master filter suggests a 'quality uber-gate' approach."
  - "SHIFU scope: KC basis + slopes, Dante's Peak/Avalanche (Q3 osc), Ping Pong (body), Swingin (pivot). No Hayashi (traditional SHIFU) elements found."
  - "Offset complexity: moff (offset=0 or 1) + f_align() + fbm (first-bar-master) + al_mf_bull/al_mf_bear — 3 layers of offset logic."
  - "Plot economy: Combined 'anyAFBull' (Alpha–Foxtrot all 6 variants) onto single plotshape + label (line 1509–1520) to save 10 plot slots."
  - "Nagasaki 'always alert' exception: fires alerts even without show_Nagasaki if co-occurring with Typhoon/Whale/Super/Golf/Tomcat/FullStack/FVGStack (line 1439–1444)."
