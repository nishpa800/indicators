    description: "barstate.isconfirmed gate applied to all signal generation"
    lines: "251"
  
  - id: fauna_suite
    description: "FAUNA core with MB (Momentum Bar), RE (Range Expansion), TA (Trend Acceleration) families, plus exclusions GG (Gap-and-Go), TR (Trend Reversal), ES (End-of-Swing), GDR (Gap-Down Reversal)"
    lines: "417–462"
  
