indicator:
  id: fauna-shifu
  file: fauna-shifu/versions/FAUNA_SHIFU_JUMBO_CIA_1ST_PUP_v1.pine
  branch: production
  pine_version: 5
  line_count: 2338
  overlay: true
  one_line_purpose: "Session-first PUP gating + FAUNA core + SHIFU KC/pivot/Q3 filters + 20+ named roots + 16 composites (Jumbo CIA with Master Filter)"
  non_repainting: false
  title: "Jumbo CIA ★ 1st PUP FAUNA + SHIFU ★"
  shorttitle: "FAUNA+SH"

synopsis:
  one_sentence: "Extends FAUNA with SHIFU KC/pivot logic, applies first-bar-only PUP/Anish gating per 'Jumbo CIA' theme, masters all signals through Q3+KC+Candle Master Filter."
  shifu_role: "KC basis + slope signals, Ping Pong (body) and Swingin (pivot) S/R levels, Dante's Peak/Avalanche (Q3 oscillator), Quotient3 for overbought/oversold state."
  jumbo_cia_role: "First-bar-only master gate (line 10): when ON, single-bar signals (RVOL, PBJ, FAUNA, DISP) must fire on is_new_sess AND require directional confirmation (anyDirectional). Multi-bar signals (SAAB²/KRATOS²/Katana/Double Disp/Foxtrot) EXEMPT from first-bar gate."
  master_filter: "KC + Candle Master Filter (lines 1449–1461): all final signals gated by (High >= KC_MA AND Close > Open) for bulls, (Low <= KC_MA AND Close < Open) for bears. Optional Q3 oscillator layer: (Q3 < 0) for bulls, (Q3 > 0) for bears."

