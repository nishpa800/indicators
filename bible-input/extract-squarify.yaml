# ─────────────────────────────────────────────────────────────────────────────
# COMPOSITES — every numbered Squarify Tier-3 production plot (S1..S46) +
# the two TIER opening confluence plots (counted as roots above, plotted as
# composites in the alert/log stream).
# ─────────────────────────────────────────────────────────────────────────────
composites:
  # ── FOUNDATIONAL / STANDALONE (S1-S13) ────────────────────────────────────
  - id: squarify::S1_SD_BANG
    tier: 3
    plain_english: "SD! (Super Duper) — REDEFINED v2: Unified Combo + consolidated NPM + PUP. All on visual bar [1]."
    composition:
      type: AND
      operands: ["squarify::UNIFIED_COMBO_BULL", "squarify::NPM_CONS_BULL", "sigPUP[1]"]
    composition_note: "PUP operand is raw sigPUP[1] (the atomic PUP boolean, prior bar), NOT det_b2bPUP. Pine L1689 uses nz(sigPUP[1]) where sigPUP is defined locally in squarify — it is the single-bar PUP atom, not the B2B composite."
    offset: -1
    plot_call: "plotshape(_masterGate and en_1 and sduperBull, \"1 SD!\",shape.flag,location.bottom,#FFD700,text=\"SD!\",textcolor=color.white,size=size.huge,offset=-1)"
    alertcondition_id: "SD!"
    pine_source_line_range: "L1689-L1690 (def); L2227 (plot)"

  - id: squarify::S2_SUPER
    tier: 3
    plain_english: "SUPER — REDEFINED v2: Unified Combo + consolidated NPM. Suppressed when SD! also fires."
    composition:
      type: AND_NOT
      operands: ["squarify::UNIFIED_COMBO_BULL", "squarify::NPM_CONS_BULL", "NOT squarify::S1_SD_BANG"]
    offset: -1
    plot_call: "plotshape(_masterGate and en_2 and superBull and not sduperBull, \"2 SUPER\",shape.flag,location.top,#00FF00,text=\"SUPER\",textcolor=color.white,size=size.huge,offset=-1)"
