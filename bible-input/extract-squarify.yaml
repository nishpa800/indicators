internal_helpers:
  - name: "f_add(base,part)"
    purpose: "Concat helper used to build the Bloomberg-style aggregated alert string."
  - name: "hvd_tf2sec(t)"
    purpose: "Convert HV+D HTF profile dropdown labels to seconds for tfSec gating."
  - name: "f_ma(src,len,t)"
    purpose: "Generic moving average dispatcher (EMA/SMA/WMA/HMA/VWMA) used by PBJ engine."
