    purpose: "PBJ engine helpers for tracking long/short cross levels and approach detection."
  - name: "has_level(price,type)"
    purpose: "Ping-Pong SR engine: dedup level array."
  - name: "f_hadYesterday(sig)"
    purpose: "Boolean lookback over previous trading day for B2B-Days combos (F2, E3, Cluster)."
  - name: "f_cb / f_cb_npm"
    purpose: "Checkbox qualifier evaluators (Set 1/2/3) for non-displacement and napalm-aligned combos."
  - name: "f_tok / f_zov / f_sb / f_ss / f_bl_t / f_sl_t / f_bo_t / f_so_t"
    purpose: "TNT engine internals: token/zone-overlap/strength helpers."
  - name: "bh_tci/bh_mf/bh_tradition"
    purpose: "Boom Hunter inner WaveTrend/MFI/RSI tradition compositor."
  - name: "f_rvol_1x_threshold / f_gs_moab_threshold / f_saab_kratos_threshold / f_wtc_threshold / f_hiroshima_threshold"
    purpose: "Per-timeframe RVOL bucket threshold tables."
  - name: "f_b / f_n / f_fwd_ret"
    purpose: "Stats engine string/number formatters and forward-return lookback."

# ─────────────────────────────────────────────────────────────────────────────
# ROOTS
# Squarify is overwhelmingly an aggregator. The roots actually defined here
# (vs. imported by name from sibling indicators) are: HV+D pipeline (HVD_BULL/
# HVD_BEAR), Ultra57 Foster/Exhaustion/Cluster atomics (F2, E3, FC), B2B-Days
# tracker, B2B PUP scaffolding, the TIER-1 / TIER-2 OPENING CONFLU
# detectors, the WBUSH 5-family classifier, the matrix Neo/Trinity primitives,
# the NPM consolidated classifier (NapalmCons = napalm OR charge), and a
# private "stats" engine. All RVOL / FAUNA / PBJ / GZI / PUP / Boom Hunter /
# TNT / Long-Short / Combo Set engines are duplicated from the sibling
# indicators (heavy-pentagon, fauna, hvd-pbj-ppd, b2b-pup, hv-fvg-gz1-og,
# tnt-od) and emit the canonical foreign signal names. Per the instructions,
# only roots FIRST DEFINED here (or where Squarify is the canonical source)
# are listed below.
# ─────────────────────────────────────────────────────────────────────────────
roots:
  - id: squarify::HVD_BULL
    family: hv-displacement
    plain_english: "HV+D bullish: any of base/HTF1/HTF2 volume-rank ladder confirmed AND prior-bar displacement with bullish FVG."
    boolean_summary: "hvd_fire_bull = base_combo_bull or htf1_combo_bull or htf2_combo_bull"
    parameters: ["d1_len","d1_mult","d2_len","d2_mult","d3_len","d3_mult","ub50..ub1000","useHEV","h1On","h1From/h1To","uh1_*","h2On","h2From/h2To","uh2_*"]
    offset: -1
    plot_call: "(no direct plot — terminal output consumed by S27..S31, UU paths, etc.)"
    pine_source_line_range: "L60-L304"
    notes: "Three-layer pipeline: base HV (50..1000-bar + HEV) × Disp1, HTF1 × Disp2, HTF2 × Disp3. Pipeline is air-gapped from PBJ/Zoo/Combo logic."

  - id: squarify::HVD_BEAR
