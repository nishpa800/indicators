composites:
  - id: ultra-combo::FAUNA_BULL
    tier: 2
    plain_english: "Bullish FAUNA: any of MB/RE/TA fires AND none of the four exclusion atoms (GG/TR/ES/GDR) fires"
    composition:
      type: AND_NOT
      operands:
        - "ultra-combo::MB_BULL"
        - "ultra-combo::RE_BULL"
        - "ultra-combo::TA_BULL"
        - "NOT ultra-combo::GG_BULL"
        - "NOT ultra-combo::TR_BULL"
        - "NOT ultra-combo::ES_BULL"
        - "NOT ultra-combo::GDR_BULL"
    offset: 0
    plot_call: "(no own plotshape; surfaced as 'FAUNA+' in f_fullScan and consumed by sigSuperBull*, gz1MegaBull, hvMegaBull, gz1hvMegaBull)"
    alertcondition_id: "(no standalone alertcondition; embedded in MEGA / SUPER alerts)"
    pine_source_line_range: "L730-L732"
    notes: "LOCKED definition for the bible: (MB OR RE OR TA) AND NOT (GG OR TR OR ES OR GDR)."

  - id: ultra-combo::FAUNA_BEAR
    tier: 2
    plain_english: "Bearish FAUNA: any of bear MB/RE/TA fires AND none of bear GG/TR/ES/GDR exclusion atoms fires"
    composition:
      type: AND_NOT
      operands:
        - "ultra-combo::MB_BEAR"
        - "ultra-combo::RE_BEAR"
        - "ultra-combo::TA_BEAR"
        - "NOT ultra-combo::GG_BEAR"
        - "NOT ultra-combo::TR_BEAR"
        - "NOT ultra-combo::ES_BEAR"
        - "NOT ultra-combo::GDR_BEAR"
    offset: 0
    plot_call: "(no own plotshape)"
    alertcondition_id: "(embedded in MEGA / SUPER alerts)"
    pine_source_line_range: "L746-L748"
    notes: ""

  - id: ultra-combo::ROC_BULL
    tier: 2
    plain_english: "Bull ROC composite: PBJ-bull AND ROC+WaveTrend dual-confirmation (b1+b4 OR b3+b2) AND any-bull HW AND green body"
    composition:
      type: AND
      operands:
        - "hvd-pbj-ppd::PBJ_BULL"
        - "ultra-combo::ROC_BULL_PRIMITIVE"
        - "ultra-combo::LBWT_BULL_CROSS"
