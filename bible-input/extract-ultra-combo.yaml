    plot_call: "(no dedicated plotshape — internal to FAUNA composition)"
    alertcondition_id: "(component of FAUNA)"
    pine_source_line_range: "L717"
    notes: "First definition that locks the FAUNA-MB primitive."

  - id: ultra-combo::MB_BEAR
    family: fauna_core
    plain_english: "FAUNA Momentum-Body bear (mirror of MB_BULL)"
    boolean_summary: "fMB_r = conf and fauna_dn and fauna_bodySz > 1.6*fauna_atr and fauna_bodyRat > 0.7 and volume > 1.8*fauna_avgVol"
    parameters: ["mirror"]
