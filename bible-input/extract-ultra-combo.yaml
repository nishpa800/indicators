# Specifically nail FAUNA's structure:
fauna_decomposition:
  expression: "(MB OR RE OR TA) AND NOT (GG OR TR OR ES OR GDR)"
  positive_components:
    - { name: MB, role: root, source_line: "L717 (bull) / L735 (bear)" }
    - { name: RE, role: root, source_line: "L718 (bull) / L736 (bear)" }
    - { name: TA, role: root, source_line: "L719 (bull) / L737 (bear)" }
  exclusion_components:
    - { name: GG, role: root, source_line: "L722 (bull) / L740 (bear)" }
    - { name: TR, role: root, source_line: "L727 (bull) / L743 (bear) — formula = WeakBear AND (MB OR RE OR TA); has its own boolean and is referenced by name, so classified as root per prompt" }
    - { name: ES, role: root, source_line: "L728 (bull) / L744 (bear) — formula = StrongBear AND (MB OR RE OR TA); same root rationale" }
    - { name: GDR, role: root, source_line: "L729 (bull) / L745 (bear) — formula = (close[1]<open[1]) AND GG; same rationale" }

cross_indicator_dependencies:
  # PBJ / PB engine — locally re-implemented in ultra-combo, but the canonical
  # detector lives in hvd-pbj-ppd. Bible-side, ultra-combo's PBJ/PB references
  # CHAIN to hvd-pbj-ppd's primitives.
  - "hvd-pbj-ppd::PBJ_BULL"
  - "hvd-pbj-ppd::PBJ_BEAR"
  - "hvd-pbj-ppd::PB_BULL"
  - "hvd-pbj-ppd::PB_BEAR"
  - "hvd-pbj-ppd::PUP"
  - "hvd-pbj-ppd::PPD"
  - "hvd-pbj-ppd::B2B_PUP"
  - "hvd-pbj-ppd::B2B_PPD"
  - "hvd-pbj-ppd::SUPER_PUP"
  - "hvd-pbj-ppd::SUPER_PPD"
  - "hvd-pbj-ppd::FIRST_PUP_PASS"
  - "hvd-pbj-ppd::FIRST_PPD_PASS"
  - "hvd-pbj-ppd::ANISH_BULL_PASS"
  - "hvd-pbj-ppd::ANISH_BEAR_PASS"
  # Heavy Weapon RVOL family — locally implemented; canonical home varies (RVOL
  # 1x / Grand Slam / MOAB / WTC / Hiroshima / Nagasaki typically live in heavy-weapon)
  - "heavy-weapon::SIG_RVOL_1X_BULL"
  - "heavy-weapon::SIG_RVOL_1X_BEAR"
  - "heavy-weapon::SIG_GRANDSLAM"
  - "heavy-weapon::SIG_MOAB"
  - "heavy-weapon::SIG_WTC"
  - "heavy-weapon::SIG_HIROSHIMA"
  - "heavy-weapon::SIG_NAGASAKI"
  # SAAB explicitly EXCLUDED — but documented for the bible
  - "heavy-pentagon::SAAB (deliberately EXCLUDED from anyBullRVOL/anyBearRVOL — see header L7 + L302)"
  # GZ1 / HV FVG — local implementation of the GZI engine
  - "hv-fvg-gz1-og::GZI_BULL"
  - "hv-fvg-gz1-og::GZI_BEAR"
  - "hv-fvg-gz1-og::HV_BULL_FVG"
  - "hv-fvg-gz1-og::HV_BEAR_FVG"

uncertain_or_questions:
  - "TR/ES/GDR are technically composite formulas (each AND/depends on MB|RE|TA or GG), but the prompt names them as primitives to classify; classified as roots since each has its OWN boolean variable (fTR_b/fES_b/fGDR_b) AND is referenced by name within the locked FAUNA expression. Confirm bible convention."
  - "MB/RE/TA are defined TWICE in the file: once at L99-L106 (bull_*/bear_* — used by F2/E3/FC) and again at L717-L737 (fMB_*/fRE_*/fTA_* — used by FAUNA). The arithmetic is identical. Treated as one root per (name, direction); the FAUNA-scoped definition is the canonical lock for the bible."
  - "F2/E3/FC are first-defined-here LCD primitives — no other indicator owns them in the repo (PBJ/PB/PUP/PPD live in hvd-pbj-ppd, GZ/HV in hv-fvg-gz1-og). They are listed as ultra-combo-namespace roots."
  - "ROC and LBWT are decomposed into 5 atoms each (b1..b5_roc, r1..r5_roc) — the 'primitive' name 'ROC' and 'LBWT' map to representative crossover/crossunder atoms (b1_roc/r1_roc for ROC, ld_xup/ld_xdn for LBWT). Other atoms (b2..b5_roc, r2..r5_roc) are listed under internal_helpers because they're never referenced standalone outside of bull2_cond/bear2_cond."
  - "The branch tag was given as claude/add-txt-indicator-format-b4FUu in the prompt, but the working tree is currently on claude/organize-indicators-hierarchy-8JDw1. Recorded the prompt's value verbatim per its instruction."
  - "anyBullRVOL/anyBearRVOL (L750-L751) deliberately differ from anyBullHW/anyBearHW (L870-L871) — the latter additionally include sigROC* and the Super combos. Both are used as gates in different composites; documented as internal helpers."
  - "DISP_BULL/DISP_BEAR are listed as composites because the displacement primitive (range > 5*stdev * prevDisp) AND the FVG primitive are bound together in the same boolean (sigDISPBull). They have no NAME outside ultra-combo so are not roots."
