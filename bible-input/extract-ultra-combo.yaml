indicator:
  id: ultra-combo
  file: ultra-combo/versions/ULTRA_COMBO_v57_pine6.pine
  branch: claude/add-txt-indicator-format-b4FUu
  pine_version: 6
  line_count: 1147
  overlay: true
  one_line_purpose: "Aggregator firing combo signals across PBJ/PB, F2/E3/FC, B2B PUP/PPD, Heavy Weapon, GZ1/HV FVG, FAUNA, displacement, ROC+WaveTrend, TB/Foster, Opener, 3-Bar, Mega, Super B2B Days"
  has_v5_port: "ULTRA_COMBO_v57_pine5.pine (logic 1:1)"
  locks_definitions:
    - "FAUNA = (MB OR RE OR TA) AND NOT (GG OR TR OR ES OR GDR)"
    - "anyBullRVOL/anyBearRVOL deliberately exclude SAAB/Kratos (header note + L302)"
    - "All signals gated by barstate.isconfirmed (`conf`) for non-repainting"

internal_helpers:
  - name: f_barsPerDay
    purpose: "Estimate confirmed RTH bars/day at current TF for back-2-back-day lookbacks (L17-L23)"
  - name: bull_MB / bull_RE / bull_TA / bear_MB / bear_RE / bear_TA
    purpose: "Internal MB/RE/TA primitives used by the FC cluster + F2/E3/FC engine. Defined L99-L106. NOT to be confused with the FAUNA-scoped fMB/fRE/fTA at L717-L719 which redefine the same logic in fauna_* variables."
  - name: b1_* / b4_* (FC cluster scaffolding)
    purpose: "Bullish (b1_*) and bearish (b4_*) FC-cluster threshold-vs-sequence overlap engine: rolling rvol windows, threshold-bar arrays, sequence-bar arrays, overlap detection, all to compute sBullFC / sBearFC (L124-L296)"
  - name: sessBar
    purpose: "RTH-session bar counter (1-indexed at first session bar). Used for F2/E3 sequencing and Opener (L108-L119)"
  - name: bb_* (RVOL Heavy Weapon scaffolding)
    purpose: "Body-spike-vs-volume normalization producing bb_normalizedPrice / bb_baseBullish / bb_baseBearish for the RVOL family thresholds (L304-L337)"
  - name: f_rvol_1x_threshold / f_gs_moab_threshold / f_hiroshima_threshold
    purpose: "Per-timeframe threshold tables for 1x / Grand Slam / MOAB / Hiroshima (L308-L320)"
  - name: f_ma / dyn_long / dyn_short / curr_long / curr_short / st_dir / sig_line
    purpose: "Anish-TB-Foster supertrend-style trail used by the PBJ/PB engine for buy_cross/sell_cross/bull_reaccel/bear_reaccel (L377-L409)"
  - name: f_add_lvl / f_add_lander / f_add_reaccel / f_check_approach
    purpose: "PBJ/PB level-bank management: build, prune, check approach against retained candle/reaccel zones (L422-L500)"
  - name: wait_buy / wait_sell / wait_pbj_buy / wait_pbj_sell
    purpose: "PBJ/PB latch flags arming sigBullPB/sigBullPBJ/sigBearPB/sigBearPBJ on the next supertrend cross (L481-L519)"
  - name: bull_MB / bull_RE / bull_TA (bullPass / bearPass EMA stack)
    purpose: "PUP/PPD / Anish-stages 50/150/200 EMA + 252-bar 52w hi/lo passes (L524-L532)"
  - name: sPPBull / sPPBear / b2bPUP / b2bPPD / superPup / superPPD / firstPUPPass / firstPPDPass
    purpose: "PUP/PPD price+volume burst signals and consecutive-bar / first-pass-after-neutral derivatives (L534-L579). These are internal building blocks; ultra-combo composes them into combos but does not expose them as named roots."
  - name: tbWindowOpen/tbWindowCount, fosterWindowOpen/fosterWindowCount
    purpose: "TB/Foster 5+ consecutive-pass setup window state (L584-L642)"
  - name: roc_val / roc_ema / ld_wt1 / ld_wt2 / ld_hist / ld_xup / ld_xdn
    purpose: "ROC over 5 bars and LazyBear WaveTrend (HLC3 EMA8 → CI → EMA21 / SMA4) building blocks for b1..b5_roc / r1..r5_roc and bull2_cond/bear2_cond (L647-L671)"
  - name: f_has
    purpose: "Window-of-N lookback that returns true if any sig[i] in the last win bars (L673-L679)"
  - name: bull2_cond / bear2_cond
    purpose: "ROC+WaveTrend dual-confirmation predicate used to gate sigROCBull/sigROCBear (L681-L682)"
  - name: hasBullHW / hasBearHW
    purpose: "Local Heavy-Weapon collapse used as the SAAB/Kratos-free pre-filter for sigROCBull/sigROCBear (L684-L685)"
  - name: anyBullRVOL / anyBearRVOL
    purpose: "RVOL-family aggregate explicitly excluding SAAB/Kratos, used inside Super-PBJ/Super-PB constructions (L750-L751)"
  - name: anyBullHW / anyBearHW
    purpose: "Wider HW aggregate (RVOL family + sigROC + Super combos) used for HW combo plots (L870-L871)"
  - name: fauna_* (atr/avgVol/avgBody/avgRange/avgDelta/trendMA/body/rng2/bodySz/bodyRat/up/dn/prev_body/prev_range/StrongBear/WeakBear/StrongBull/WeakBull)
    purpose: "FAUNA-scoped recomputation of the same MB/RE/TA arithmetic in independent variables, plus the strong/weak-bear/bull qualifiers used by ES/TR (L703-L745)"
  - name: fvgs (typed array) + lastT
    purpose: "Rolling FVG bank consumed by GZI/HV detection. Bull/bear FVG defined L776-L777, bank evolves L787-L823"
  - name: gzThresh
    purpose: "Cumulative-mean (high-low)/low scaled by bar_index — gating threshold for both bullish/bearish FVG widths (L775)"
  - name: f_hadSignalYesterday
    purpose: "Lookback for any sig in the prior ~2 trading days (uses barsPerDay) to power the *_B2BDays_* combos and superB2BDays (L853-L859)"
  - name: f_hwStr / f_fullScan
    purpose: "Alert message string builders (L925-L1013)"
  - name: scanTrigger
    purpose: "Composite alert-only trigger = sigSuperBullPBJ or sigSuperBullPB or sigSuperBearPBJ or sigSuperBearPB or sigGrandSlam or sigMOAB (L920) — alertcondition-exposed but not plotted as a named shape"

roots:
  # Per the rules: a "root" is a NAMED LCD primitive that has its own atomic boolean
  # AND is referenced by name from outside ultra-combo. Inside ultra-combo, none of
  # the new primitives (F2, E3, FC, MB, RE, TA, GG, TR, ES, GDR, TB, Foster, Opener,
  # 3-Bar, Mega, SBBD, ROC, LBWT) are imported from elsewhere — every one is locally
  # defined here. Therefore every primitive that has its own atomic boolean
  # qualifies as a root authored in ultra-combo's namespace; primitives that only
  # exist as internal helpers inside a composite (no standalone boolean OR not
  # plotshape-named) are kept under internal_helpers.
  #
  # Roots defined here that DO have a standalone boolean and are first-class
  # named outputs (own plotshape title or own combo-name in alerts/scan output):

  - id: ultra-combo::F2_BULL
    family: f2_e3_fc
    plain_english: "Bullish F2: at session bar 2, this and previous bar are both MB (momentum-body) bullish events"
    boolean_summary: "sBullF2 = conf and sessBar==2 and bull_MB and bull_MB[1]"
    parameters:
      - "atr14 = ta.atr(14)"
      - "avgVol20 = ta.sma(volume,20)"
      - "MB threshold: bodySize > 1.6*atr14, bodyRatio > 0.7, volume > 1.8*avgVol20"
    offset: 0
    plot_call: "(no dedicated plotshape; surfaced via f_fullScan as 'F2+' and via combo plots e.g. PBJ+F2)"
    alertcondition_id: "(component of PBJ+F2, B2B+F2, F2+Cluster→E3, etc.)"
    pine_source_line_range: "L209"
    notes: "F2 has no own plotshape but is named in alerts (F2+) and is the named atom that combos consume."

  - id: ultra-combo::F2_BEAR
    family: f2_e3_fc
    plain_english: "Bearish F2: at session bar 2, this and previous bar are both bearish MB events"
    boolean_summary: "sBearF2 = conf and sessBar==2 and bear_MB and bear_MB[1]"
    parameters: ["same MB thresholds as F2_BULL but with bodyDn"]
    offset: 0
    plot_call: "(no dedicated plotshape; surfaced as 'F2-' in scan + combo plots)"
    alertcondition_id: "(component-only)"
    pine_source_line_range: "L296"
    notes: ""

  - id: ultra-combo::E3_BULL
    family: f2_e3_fc
    plain_english: "Bullish E3: at session bar 3, current and previous two bars each fired MB OR RE OR TA bull"
    boolean_summary: "sBullE3 = conf and sessBar==3 and b2_ev and b2_ev[1] and b2_ev[2] where b2_ev = bull_MB or bull_RE or bull_TA"
    parameters: ["same MB/RE/TA atomic thresholds (L99-L101)"]
    offset: 0
    plot_call: "(no dedicated plotshape; 'E3+' in scan)"
    alertcondition_id: "(component of PBJ+E3, F2CL→E3, E3⅔PP, E3×2D, F2E3seq)"
    pine_source_line_range: "L207-L208"
    notes: ""

  - id: ultra-combo::E3_BEAR
    family: f2_e3_fc
    plain_english: "Bearish E3: at session bar 3, current and previous two bars each fired bear MB/RE/TA"
    boolean_summary: "sBearE3 = conf and sessBar==3 and b5_ev and b5_ev[1] and b5_ev[2] where b5_ev = bear_MB or bear_RE or bear_TA"
    parameters: ["same"]
    offset: 0
    plot_call: "(no dedicated plotshape; 'E3-' in scan)"
    alertcondition_id: "(component)"
    pine_source_line_range: "L294-L295"
    notes: ""

  - id: ultra-combo::FC_BULL
    family: f2_e3_fc
    plain_english: "Bullish FC cluster: 2-of-3 cluster indicators true (consecutive MB / cumulative-day MB+RE+TA / consecutive in-session MB+RE) AND threshold-bar overlaps a sequence-bar within 20 bars"
    boolean_summary: "sBullFC = conf and b1_2of3 and b1_ovlp"
    parameters:
      - "rvol price spike vs 30-bar SMA prior (b1_rvolP)"
      - "threshold range: rvolP > 2.9 (b1_inRng)"
      - "sequence: 2+ uBars with cumulative rvolP >= 0.1"
      - "20-bar overlap window"
    offset: 0
    plot_call: "(no dedicated plotshape; 'FC+' in scan + combo plots)"
    alertcondition_id: "(component of PBJ+Cluster, F2CL→E3, F2CL+B2B, CL×2D)"
    pine_source_line_range: "L124-L206"
    notes: "Engine spans L124-L206 with state arrays b1_thIdx/b1_sqIdx etc."

  - id: ultra-combo::FC_BEAR
    family: f2_e3_fc
    plain_english: "Bearish FC cluster mirror of FC_BULL"
    boolean_summary: "sBearFC = conf and b4_2of3 and b4_ovlp"
    parameters: ["mirror of bullish; sequence cumulative threshold = 0.5 (vs bull 0.1)"]
    offset: 0
    plot_call: "(no dedicated plotshape; 'FC-' in scan)"
    alertcondition_id: "(component)"
    pine_source_line_range: "L211-L293"
    notes: "Bull cluster uses sum >= 0.1; bear uses sum >= 0.5 (intentional asymmetry — see L167 vs L254)."

  - id: ultra-combo::MB_BULL
    family: fauna_core
    plain_english: "FAUNA Momentum-Body bull: confirmed bullish bar with body > 1.6*ATR, body/range > 0.7, volume > 1.8*avg20"
    boolean_summary: "fMB_b = conf and fauna_up and fauna_bodySz > 1.6*fauna_atr and fauna_bodyRat > 0.7 and volume > 1.8*fauna_avgVol"
