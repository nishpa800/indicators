indicator:
  id: hv-ladder-100-to-1k
  file: hv-ladder/versions/HV_LADDER_100_TO_1K_v1.pine
  pine_version: 5
  line_count: 227
  overlay: true
  one_line_purpose: "Volume ladder: 100/200/300/400/500/600/700/800/900/1000-bar high volume + all-time high volume (HEV) + calendar-based hot spots (OpEx, Q-end, Russell, tax-loss, Jan effect, HF redemption)"
  non_repainting: true
  inputs:
    - "Show 100-Bar High Vol — bool, default true (line 32)"
    - "Show 200-Bar High Vol — bool, default true (line 33)"
    - "Show 300-Bar High Vol — bool, default true (line 34)"
    - "Show 400-Bar High Vol — bool, default true (line 35)"
    - "Show 500-Bar High Vol — bool, default true (line 36)"
    - "Show 600-Bar High Vol — bool, default true (line 37)"
    - "Show 700-Bar High Vol — bool, default true (line 38)"
    - "Show 800-Bar High Vol — bool, default true (line 39)"
    - "Show 900-Bar High Vol — bool, default true (line 40)"
    - "Show 1000-Bar High Vol — bool, default true (line 41)"
    - "Show All-Time High Vol (HEV) — bool, default true (line 42)"
    - "Show Hot Spot Signals — bool, default true (line 43)"

internal_helpers:
  - id: hv-ladder-100-to-1k::vol_confirmed_bar_architecture
    description: "All volume comparisons use [1] (prior confirmed bar) to prevent live-bar repainting. ta.highest(volume, N)[1] and volume[1] guarantee condition never changes once bar closes."
    lines: "45-55 (architecture comment), 57-66 (volume[1] == ta.highest(volume, N)[1])"
  - id: hv-ladder-100-to-1k::hev_state_tracking
    description: "Tracks all-time maximum volume across only confirmed bars. var maxVolEver updated only with volume[1], isHEV set to true only when new max found."
    lines: "73-77 (var maxVolEver, isHEV logic)"
  - id: hv-ladder-100-to-1k::calendar_opex_window
    description: "Monthly Options Expiration detection: 3rd Friday window (dayofmonth 15-21) fired 3-5 days before (Mon–Wed of that week)."
    lines: "101"
  - id: hv-ladder-100-to-1k::calendar_quarter_end
    description: "Quarter-end rebalancing window: last 5 trading days of Mar/Jun/Sep/Dec (dayofmonth 23-27)."
    lines: "104"
  - id: hv-ladder-100-to-1k::calendar_russell
    description: "Russell Reconstitution: last Friday of June (dayofmonth 19-24)."
    lines: "107"
  - id: hv-ladder-100-to-1k::calendar_tax_loss
    description: "Tax-loss selling peak: last days of December (dayofmonth 21-26)."
    lines: "110"
  - id: hv-ladder-100-to-1k::calendar_january_effect
    description: "January Effect: early-January buying surge, flagged late December (dayofmonth 27-30 of month 12)."
    lines: "113"
  - id: hv-ladder-100-to-1k::calendar_hf_redemption
    description: "Hedge Fund 45-day redemption notices (~May 15 & Nov 15, window dayofmonth 10-13)."
    lines: "116"
  - id: hv-ladder-100-to-1k::plot_priority_logic
    description: "Multi-level priority filtering: above bar HEV > 1000 > 900 > ... > 100 (all above-bar from highest to lowest). Hot Spot independent. Each plot_* is single source of truth for both plotshape and alertcondition."
    lines: "128-143 (priority logic)"
  - id: hv-ladder-100-to-1k::signal_aggregation
    description: "Integer counter of active volume signals and array collection of all signal states for downstream composite studies."
    lines: "204-218 (activeVolSignals int, signalStates array<bool>)"

