composites:
  - id: hv-ladder-100-to-1k::VolumeHierarchy
    tier: 2
    aka: ["Priority Volume Ladder", "Highest Active Signal Only"]
    definition: "Only ONE signal fires per bar: HEV if true (suppresses all 100-1000 bins); else 1000 if true (suppresses 900-100); else 900 if true (suppresses 800-100); ... else 100 if true. Hot Spot is independent overlay, always shown. Priority: HEV > 1000 > 900 > 800 > 700 > 600 > 500 > 400 > 300 > 200 > 100."
    depends_on:
      - hv-ladder-100-to-1k::HV100
      - hv-ladder-100-to-1k::HV200
      - hv-ladder-100-to-1k::HV300
      - hv-ladder-100-to-1k::HV400
      - hv-ladder-100-to-1k::HV500
      - hv-ladder-100-to-1k::HV600
      - hv-ladder-100-to-1k::HV700
      - hv-ladder-100-to-1k::HV800
      - hv-ladder-100-to-1k::HV900
      - hv-ladder-100-to-1k::HV1000
      - hv-ladder-100-to-1k::HEV
      - hv-ladder-100-to-1k::HotSpot
    lines: "132-143 (plot_* priority logic), 150-200 (plotshapes and alerts using gated plot_* variables)"
    fire_var: "plot_HEV, plot_1000, plot_900, ..., plot_100 (per bar, only one fires; plot_HS independent)"
    plot:
      multi_tier: true
      description: "Single tier (all above bar): HEV > 1000 > 900 > 800 > 700 > 600 > 500 > 400 > 300 > 200 > 100. HS always shows."
    alert: "Each signal has corresponding alert; desync prevented by using same plot_* variable for both plot and alert."
    note: "This is implicit composition through priority filtering with 10 volume ladder bins. The effect is a granular hierarchy where only the strongest signal is visible, reducing visual clutter while providing finer resolution than the 50-to-1k variant. HotSpot operates independently."

cross_indicator_dependencies: []

uncertain_or_questions:
  - "HotSpot composite: The calendar windows (opExWindow, qtrEndWindow, etc.) are intermediate booleans combined via OR into isHotSpot. They are helper expressions, not named roots. HotSpot (isHotSpot) is the root. The calendar windows themselves are internal_helpers (lines 101-116). Interpretation confirmed."
  - "VolumeHierarchy composite: The gating logic on lines 132-143 uses a 10-level negative-conditional chain (and not isHEV, and not is1000Bar, and not is900Bar, ... and not is200Bar for plot_100) to enforce strict priority. This is a multi-level exclusion pattern, not a pure AND/OR composition. Documented as a tier-2 composite because it is a systematic rule about signal emissions, but it is implicit (achieved through plotshape gating variables) rather than explicit (no single 'fire_' variable). The architecture guarantees each bar emits at most one volume signal, providing fine-grained volume ladder resolution."
  - "Offset=-1 on all plotshape calls lands each marker on the [1] bar (the confirmed bar being measured), not the current forming bar. This is a non-repainting architectural choice, not a root or composite behavior."
  - "Signal aggregation (activeVolSignals, signalStates array) on lines 204-218 are exported for downstream composite studies but are not themselves roots or composites in this indicator."
  - "Difference from 50-to-1k variant: this variant uses 10 bins (100, 200, 300, ..., 1000) instead of 5 bins (50, 150, 250, 500, 1000). Both use the same HEV + HotSpot architecture. Calendar windows are identical (lines 101-116 match 50-to-1k lines 100-115 word-for-word). The 100-to-1k variant provides finer volume granularity but denser visual output due to more bins at higher priority."
