  file: vob-asym/versions/VOB_Asym_T3x6_FROM_MASTERDIR_ummmm_2026-05-10.pine
  branch: unknown
  pine_version: 6
  line_count: 1473
  overlay: true
  one_line_purpose: "VOB Asym T3 ×6 + MutEx Lines + Claude ummmm (Master Directory variant with plotshape layout changes; same line count as v8)"
  notes: >-
    This variant (1473 lines) has IDENTICAL line count to VOB_Asym_T3x6_MutEx_Claude_v8_2026-05-02 but differs 
    in plotshape() locations and shapes for T3 buy/sell signals. Key differences:
    (1) v8 uses mixed locations (top/abovebar/belowbar/bottom) with mixed shapes (circle/arrowdown/arrowup/cross/xcross).
    (2) ummmm uses UNIFORM locations and shapes: all T3 buy signals use circle+belowbar, all T3 sell signals use circle+abovebar.
    (3) Simplification suggests the ummmm variant is either (a) a UI/UX improvement for visual consistency, or (b) a development branch that fell back from advanced plotshape layout to simpler uniform shapes.
    (4) Title includes "Claude ummmm" suffix — likely a development label meaning "to be clarified" or "placeholder naming".
    Status: Same engine as v8 but with flattened visual hierarchy; unclear if this is a regression or deliberate simplification.

