cross_variant_notes: >-
  The vob-asym ummmm variant is identical to v8 in all internal logic (line count, roots, composites, engines, 
  alerting). The ONLY difference is the visual presentation layer: T3 buy/sell plotshape definitions. 
  The ummmm variant unifies all shapes to circle and aligns all buy signals to belowbar + all sell signals to abovebar, 
  whereas v8 used tier-specific shapes and locations for visual differentiation. This suggests ummmm is either 
  (1) a UI/UX refinement pass, or (2) a development checkpoint that fell back to simpler shapes. 
  No signal logic changes — this is purely cosmetic. The 'ummmm' title label suggests work-in-progress status.
